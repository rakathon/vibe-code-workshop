<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dining Web Expansion — Lunch &amp; Learn</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #f7f7f7;
      --surface:     #ffffff;
      --surface2:    #fafafa;
      --border:      #e0e0e0;
      --border2:     #bbbbbb;
      --text:        #111111;
      --muted:       #777777;
      --pale:        #f2f2f2;
      --black:       #000000;
      --dark:        #111111;
      --mid:         #333333;
      --light:       #666666;
    }

    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg); color: var(--text);
      overflow: hidden; display: flex; flex-direction: column;
    }

    /* ══ HEADER ══════════════════════════════════════════════════════════════ */
    .header {
      background: linear-gradient(135deg, #000 0%, #1a1a1a 60%, #3a3a3a 100%);
      padding: 0.9rem 2rem;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 4px 20px rgba(0,0,0,0.25);
      flex-shrink: 0; position: relative; overflow: hidden;
    }
    .header::before {
      content: ''; position: absolute; inset: 0;
      background: url('data:image/svg+xml,<svg width="60" height="60" xmlns="http://www.w3.org/2000/svg"><circle cx="30" cy="30" r="1.2" fill="rgba(255,255,255,0.1)"/></svg>');
      pointer-events: none; animation: bgmove 25s linear infinite;
    }
    @keyframes bgmove { from{background-position:0 0} to{background-position:60px 60px} }

    .header-left { display:flex; align-items:center; gap:0.75rem; position:relative; z-index:1; }
    .header-emoji { font-size:1.8rem; animation:float 3s ease-in-out infinite; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
    .header-title { color:#fff; font-size:1.1rem; font-weight:700; }
    .header-sub   { color:rgba(255,255,255,.75); font-size:0.75rem; margin-top:1px; }

    .header-right { display:flex; align-items:center; gap:0.6rem; position:relative; z-index:1; }
    .h-pill {
      background:rgba(255,255,255,.18); border:1px solid rgba(255,255,255,.25);
      color:#fff; padding:0.3rem 0.85rem; border-radius:999px;
      font-size:0.75rem; font-weight:600; white-space:nowrap;
    }
    .h-pill.progress-pill { min-width:120px; }

    .progress-bar-wrap { position:absolute; bottom:0; left:0; right:0; height:3px; background:rgba(255,255,255,.15); }
    .progress-bar-fill { height:100%; background:linear-gradient(90deg,#888,#fff); transition:width .35s ease; }

    /* ══ LAYOUT ══════════════════════════════════════════════════════════════ */
    .layout { display:flex; flex:1; min-height:0; position:relative; }

    /* ══ SIDEBAR ══════════════════════════════════════════════════════════════ */
    .sidebar {
      width:260px; flex-shrink:0; background:var(--surface);
      border-right:1px solid var(--border); display:flex; flex-direction:column;
      overflow:hidden; transition:width .3s ease;
    }
    .sidebar.collapsed { width:0; border-right:none; }

    .sidebar-head {
      padding:.8rem 1rem; border-bottom:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between;
      background:var(--surface2); flex-shrink:0;
    }
    .sidebar-head h3 { font-size:.72rem; font-weight:700; letter-spacing:.09em; text-transform:uppercase; color:var(--dark); }
    .collapse-btn {
      background:none; border:1px solid var(--border); border-radius:5px;
      cursor:pointer; padding:2px 6px; color:var(--muted); font-size:.75rem;
      transition:all .15s;
    }
    .collapse-btn:hover { background:var(--pale); color:var(--dark); border-color:var(--dark); }

    .sidebar-list { overflow-y:auto; flex:1; padding:.4rem 0; }
    .sidebar-list::-webkit-scrollbar { width:4px; }
    .sidebar-list::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }

    .sb-item {
      display:flex; align-items:flex-start; gap:.55rem;
      padding:.55rem 1rem; cursor:pointer;
      border-left:3px solid transparent; transition:all .15s;
      overflow:hidden;
    }
    .sb-item:hover  { background:var(--pale); border-left-color:var(--light); }
    .sb-item.active { background:var(--pale); border-left-color:var(--dark); }
    .sb-item.done   { border-left-color:var(--dark); }

    .sb-dot {
      flex-shrink:0; width:20px; height:20px; border-radius:50%;
      background:var(--border); display:flex; align-items:center; justify-content:center;
      font-size:.62rem; font-weight:700; color:var(--muted); margin-top:1px;
      transition:all .2s;
    }
    .sb-item.active .sb-dot { background:var(--dark); color:#fff; }
    .sb-item.done   .sb-dot { background:var(--dark); color:#fff; }
    .sb-item.done   .sb-dot::after { content:'✓'; font-size:.65rem; }
    .sb-item.done   .sb-dot .sb-num { display:none; }

    .sb-label    { font-size:.78rem; color:var(--text); line-height:1.3; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .sb-sublabel { font-size:.68rem; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

    .expand-btn {
      position:absolute; left:0; top:50%; transform:translateY(-50%);
      width:20px; height:44px; background:var(--dark); border:none;
      border-radius:0 5px 5px 0; color:#fff; cursor:pointer;
      display:none; align-items:center; justify-content:center; font-size:.65rem;
      z-index:10; box-shadow:2px 0 8px rgba(0,0,0,.2);
    }
    .expand-btn.visible { display:flex; }

    /* ══ SLIDE AREA ══════════════════════════════════════════════════════════ */
    .slide-area { flex:1; overflow:hidden; position:relative; }

    .slide {
      position:absolute; inset:0; overflow-y:auto;
      padding:2rem 2.5rem 5rem; display:none;
      animation:fadeIn .22s ease;
    }
    .slide.active { display:block; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
    .slide::-webkit-scrollbar { width:5px; }
    .slide::-webkit-scrollbar-thumb { background:var(--border2); border-radius:3px; }

    /* ══ WELCOME ══════════════════════════════════════════════════════════════ */
    .welcome-slide {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      height: 100%;
      min-height: 100%;
    }

    /* override the slide padding for welcome only */
    .slide.welcome-active {
      padding: 0 !important;
      overflow: hidden !important;
    }

    .wl-left {
      padding: 5rem 4rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      border-right: 1px solid var(--border);
    }
    .wl-eyebrow {
      display: flex; align-items: center; gap: .5rem;
      font-size: .72rem; font-weight: 600; letter-spacing: .1em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 1.5rem;
    }
    .wl-eyebrow svg { flex-shrink: 0; }
    .wl-left h1 {
      font-size: 3rem; font-weight: 800; color: var(--dark);
      line-height: 1.1; margin-bottom: 1.25rem; letter-spacing: -.5px;
    }
    .wl-left p {
      font-size: .97rem; color: var(--muted); line-height: 1.65;
      max-width: 380px; margin-bottom: 2rem;
    }
    .wl-meta {
      display: flex; align-items: center; gap: 1.5rem;
      margin-bottom: 2rem;
    }
    .wl-meta-item {
      display: flex; align-items: center; gap: .4rem;
      font-size: .85rem; color: var(--text);
    }
    .wl-meta-item svg { color: var(--muted); flex-shrink: 0; }

    .btn-begin {
      display: inline-flex; align-items: center; gap: .5rem;
      background: var(--dark); color: #fff;
      font-size: .9rem; font-weight: 700;
      padding: .75rem 1.6rem; border-radius: 9px; border: none;
      cursor: pointer; transition: opacity .2s; width: fit-content;
    }
    .btn-begin:hover { opacity: .82; }

    .wl-autosave {
      margin-top: .9rem; font-size: .75rem; color: var(--muted);
    }

    .wl-right {
      padding: 4rem 3.5rem;
      overflow-y: auto;
      display: flex; flex-direction: column; justify-content: center;
    }
    .wl-outline-label {
      font-size: .68rem; font-weight: 700; letter-spacing: .12em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 1.25rem;
    }
    .outline-list { display: flex; flex-direction: column; gap: .65rem; }
    .outline-item {
      display: flex; align-items: center; gap: 1rem;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: .95rem 1.1rem;
      cursor: pointer; transition: border-color .15s, box-shadow .15s;
      text-decoration: none; color: inherit;
    }
    .outline-item:hover { border-color: var(--border2); box-shadow: 0 2px 10px rgba(0,0,0,.06); }
    .outline-item.cert-item { border-style: dashed; }

    .oi-num {
      width: 34px; height: 34px; border-radius: 50%;
      background: var(--pale); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: .82rem; font-weight: 700; color: var(--dark); flex-shrink: 0;
    }
    .oi-icon {
      width: 34px; height: 34px; border-radius: 50%;
      background: var(--pale); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .oi-body { flex: 1; }
    .oi-title { font-size: .92rem; font-weight: 600; color: var(--dark); margin-bottom: .18rem; }
    .oi-meta  { font-size: .75rem; color: var(--muted); }
    .oi-arrow { color: var(--border2); font-size: 1rem; margin-left: auto; flex-shrink: 0; }

    .badge-pill {
      display:inline-block; background:var(--dark); color:#fff;
      font-size:.62rem; font-weight:700; letter-spacing:.12em; text-transform:uppercase;
      padding:3px 13px; border-radius:999px; margin-bottom:1.25rem;
    }

    .btn-primary {
      display:inline-block; background:var(--dark); color:#fff;
      font-size:.92rem; font-weight:700; padding:.7rem 2.25rem;
      border-radius:999px; border:none; cursor:pointer;
      transition:opacity .2s, transform .15s; box-shadow:0 4px 14px rgba(0,0,0,.18);
    }
    .btn-primary:hover { opacity:.85; transform:translateY(-2px); }

    /* ══ STEP SLIDE ══════════════════════════════════════════════════════════ */
    .step-slide { max-width:800px; margin:0 auto; }

    .step-header { display:flex; align-items:center; gap:.85rem; margin-bottom:1.4rem; }
    .step-badge {
      flex-shrink:0; width:42px; height:42px; border-radius:50%;
      background:var(--dark); display:flex; align-items:center; justify-content:center;
      font-size:1.05rem; font-weight:800; color:#fff; box-shadow:0 4px 12px rgba(0,0,0,.2);
    }
    .step-title h2 { font-size:1.28rem; font-weight:700; color:var(--text); }
    .step-title p  { font-size:.82rem; color:var(--muted); margin-top:2px; }

    /* ══ BLOCKS ══════════════════════════════════════════════════════════════ */
    .info-box {
      background:var(--pale); border:1px solid var(--border); border-radius:9px;
      padding:.85rem 1rem; margin:.9rem 0; font-size:.84rem; color:var(--text); line-height:1.6;
    }
    .info-box strong { color:var(--dark); }

    .success-box {
      background:var(--pale); border:1px solid var(--border2);
      border-left:4px solid var(--dark); border-radius:0 9px 9px 0;
      padding:.85rem 1rem; margin:.9rem 0; font-size:.84rem; color:var(--text); line-height:1.6;
    }

    .cmd-block {
      background:#111; border-radius:9px; padding:.9rem 1.1rem;
      margin:.9rem 0; position:relative; box-shadow:0 4px 14px rgba(0,0,0,.18);
    }
    .cmd-block pre {
      color:#e0e0e0; font-family:'SF Mono','Fira Code','Courier New',monospace;
      font-size:.82rem; white-space:pre-wrap; word-break:break-all; line-height:1.65;
    }

    /* ── Syntax highlight tokens inside cmd-block ── */
    .t-cmd    { color:#fff; font-weight:600; }
    .t-flag   { color:#aaa; }
    .t-str    { color:#d0d0d0; font-style:italic; }
    .t-cmt    { color:#555; font-style:italic; }
    .t-key    { color:#ccc; font-weight:600; }

    .copy-btn {
      position:absolute; top:.55rem; right:.55rem;
      background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.2);
      color:rgba(255,255,255,.8); border-radius:5px; padding:2px 9px;
      font-size:.68rem; font-weight:600; cursor:pointer; transition:all .15s;
    }
    .copy-btn:hover { background:rgba(255,255,255,.22); color:#fff; }
    .copy-btn.copied { background:#333; color:#fff; border-color:#333; }

    /* prompt block (Claude input) */
    .prompt-block {
      background:var(--surface2); border:1px solid var(--border);
      border-left:4px solid var(--dark); border-radius:0 9px 9px 0;
      padding:.85rem 1rem; margin:.9rem 0; position:relative;
    }
    .prompt-label { font-size:.65rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--dark); margin-bottom:.45rem; }
    .prompt-block p { font-size:.88rem; color:var(--text); line-height:1.6; padding-right:3.5rem; }
    .prompt-block .copy-btn {
      background:var(--pale); border:1px solid var(--border2); color:var(--dark);
    }
    .prompt-block .copy-btn:hover { background:var(--dark); color:#fff; border-color:var(--dark); }
    .prompt-block .copy-btn.copied { background:#111; color:#fff; border-color:#111; }

    .forge-cmd {
      display:inline-flex; align-items:center; gap:.4rem;
      background:var(--dark); color:#fff; font-family:'SF Mono',monospace;
      font-size:.85rem; font-weight:600; padding:.38rem .95rem; border-radius:7px; margin:.45rem 0;
    }

    /* dialog table */
    .dialog-table { width:100%; border-collapse:collapse; margin:.7rem 0; font-size:.82rem; }
    .dialog-table th {
      background:var(--pale); color:var(--dark); padding:.45rem .75rem;
      text-align:left; font-size:.68rem; font-weight:700; text-transform:uppercase;
      letter-spacing:.08em; border-bottom:1px solid var(--border);
    }
    .dialog-table td { padding:.5rem .75rem; border-bottom:1px solid var(--border); vertical-align:top; line-height:1.5; }
    .dialog-table tr:last-child td { border-bottom:none; }
    .dialog-table .prompt-col { color:var(--muted); font-style:italic; font-size:.8rem; }
    .dialog-table .answer-col code { background:var(--dark); color:#fff; padding:1px 7px; border-radius:4px; font-size:.77rem; font-weight:600; }

    /* result rows */
    .result-grid { display:flex; flex-direction:column; gap:.35rem; margin:.7rem 0; }
    .result-row {
      display:flex; align-items:baseline; gap:.7rem;
      font-size:.8rem; padding:.28rem 0; border-bottom:1px solid var(--border);
    }
    .result-row:last-child { border-bottom:none; }
    .result-file { font-family:'SF Mono',monospace; font-size:.75rem; color:var(--dark); min-width:270px; flex-shrink:0; }
    .result-desc { color:var(--muted); flex:1; }
    .result-pass { font-size:.67rem; font-weight:700; padding:1px 6px; border-radius:999px; background:var(--pale); color:var(--dark); border:1px solid var(--border2); white-space:nowrap; }

    /* substep card */
    .substep { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:1rem 1.15rem; margin:.9rem 0; }
    .substep-title {
      font-size:.78rem; font-weight:700; letter-spacing:.06em; text-transform:uppercase;
      color:var(--dark); margin-bottom:.7rem; display:flex; align-items:center; gap:.4rem;
    }
    .substep-title::before { content:''; width:7px; height:7px; border-radius:50%; background:var(--dark); flex-shrink:0; }

    hr.div { border:none; border-top:1px solid var(--border); margin:1.1rem 0; }

    /* ══ QUIZ ════════════════════════════════════════════════════════════════ */
    .quiz-slide { max-width:680px; margin:0 auto; }
    .quiz-header { display:flex; align-items:center; gap:.7rem; margin-bottom:1.3rem; }
    .quiz-badge {
      width:38px; height:38px; border-radius:50%; background:var(--dark);
      display:flex; align-items:center; justify-content:center; font-size:1rem; flex-shrink:0;
    }
    .quiz-header h2 { font-size:1.2rem; font-weight:700; color:var(--dark); }
    .quiz-header p  { font-size:.8rem; color:var(--muted); margin-top:2px; }

    .quiz-q { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:1.1rem 1.25rem; margin:.85rem 0; }
    .quiz-q p { font-size:.9rem; font-weight:600; color:var(--text); margin-bottom:.8rem; }
    .quiz-options { display:flex; flex-direction:column; gap:.45rem; }
    .quiz-opt {
      display:flex; align-items:center; gap:.6rem;
      padding:.55rem .85rem; border:1.5px solid var(--border); border-radius:7px;
      cursor:pointer; font-size:.85rem; color:var(--text); transition:all .15s;
      background:var(--surface); user-select:none;
    }
    .quiz-opt:hover { border-color:var(--border2); background:var(--pale); }
    .quiz-opt.selected { border-color:var(--dark); background:var(--pale); font-weight:600; }
    .quiz-opt.correct  { border-color:var(--dark); background:#e8e8e8; }
    .quiz-opt.wrong    { border-color:#999; background:#f5f5f5; opacity:.6; }
    .quiz-opt .opt-letter {
      width:22px; height:22px; border-radius:50%; border:1.5px solid var(--border2);
      display:flex; align-items:center; justify-content:center; font-size:.7rem; font-weight:700;
      flex-shrink:0; transition:all .15s;
    }
    .quiz-opt.selected .opt-letter { background:var(--dark); color:#fff; border-color:var(--dark); }
    .quiz-opt.correct  .opt-letter { background:var(--dark); color:#fff; border-color:var(--dark); }

    .quiz-feedback {
      margin-top:.7rem; padding:.65rem .9rem; border-radius:7px;
      font-size:.82rem; font-weight:600; display:none;
    }
    .quiz-feedback.show { display:block; }
    .quiz-feedback.ok  { background:#e8e8e8; color:var(--dark); border:1px solid var(--border2); }
    .quiz-feedback.err { background:#f5f5f5; color:#555; border:1px solid var(--border); }

    .quiz-submit {
      margin-top:1rem; background:var(--dark); color:#fff; border:none;
      border-radius:999px; padding:.6rem 1.8rem; font-size:.85rem; font-weight:600;
      cursor:pointer; transition:opacity .2s;
    }
    .quiz-submit:hover { opacity:.85; }
    .quiz-submit:disabled { background:var(--border); color:var(--muted); cursor:default; }

    .quiz-score {
      margin-top:1rem; padding:.8rem 1rem; border-radius:9px; text-align:center;
      background:var(--pale); border:1px solid var(--border2); display:none;
    }
    .quiz-score.show { display:block; }
    .quiz-score .score-num { font-size:1.8rem; font-weight:800; color:var(--dark); }
    .quiz-score .score-label { font-size:.75rem; color:var(--muted); text-transform:uppercase; letter-spacing:.07em; }

    /* ══ COMPLETE ════════════════════════════════════════════════════════════ */
    .complete-slide { max-width:640px; margin:1.5rem auto; text-align:center; }
    .complete-emoji { font-size:3.5rem; margin-bottom:.9rem; }
    .complete-slide h1 { font-size:2rem; font-weight:800; color:var(--dark); margin-bottom:.7rem; }
    .complete-slide > p { color:var(--muted); font-size:.95rem; margin-bottom:1.5rem; }

    .stats-row { display:flex; justify-content:center; gap:1.25rem; margin-bottom:1.5rem; flex-wrap:wrap; }
    .stat-box { background:var(--pale); border:1px solid var(--border2); border-radius:10px; padding:.85rem 1.35rem; min-width:90px; }
    .stat-num   { font-size:1.7rem; font-weight:800; color:var(--dark); }
    .stat-label { font-size:.68rem; color:var(--muted); text-transform:uppercase; letter-spacing:.07em; margin-top:2px; }

    /* Certificate section */
    .cert-section {
      background:var(--surface); border:1px solid var(--border); border-radius:12px;
      padding:1.5rem; margin:1.25rem 0; text-align:left;
    }
    .cert-section h3 { font-size:.85rem; font-weight:700; margin-bottom:.75rem; color:var(--dark); }
    .cert-name-row { display:flex; gap:.6rem; margin-bottom:.75rem; }
    .cert-name-input {
      flex:1; padding:.6rem .85rem; border:1.5px solid var(--border); border-radius:7px;
      font-size:.9rem; color:var(--text); outline:none; transition:border-color .15s;
      background:var(--surface);
    }
    .cert-name-input:focus { border-color:var(--dark); }
    .cert-name-input::placeholder { color:#bbb; }
    .btn-download-cert {
      background:var(--dark); color:#fff; border:none; border-radius:7px;
      padding:.6rem 1.25rem; font-size:.85rem; font-weight:600; cursor:pointer;
      white-space:nowrap; transition:opacity .2s;
      display:flex; align-items:center; gap:.4rem;
    }
    .btn-download-cert:hover { opacity:.85; }

    /* ══ CERTIFICATE CANVAS (hidden, used for download) ══════════════════════ */
    #cert-canvas { display:none; }

    /* ══ NAV BAR ══════════════════════════════════════════════════════════════ */
    .nav-bar {
      background:var(--surface); border-top:1px solid var(--border);
      padding:.65rem 2rem; display:flex; align-items:center; justify-content:space-between;
      flex-shrink:0; box-shadow:0 -2px 10px rgba(0,0,0,.04);
    }
    .nav-btn {
      background:var(--dark); color:#fff; border:none; border-radius:999px;
      padding:.5rem 1.5rem; font-size:.85rem; font-weight:600;
      cursor:pointer; transition:opacity .2s, transform .15s;
    }
    .nav-btn:hover:not(:disabled) { opacity:.85; transform:translateY(-1px); }
    .nav-btn:disabled { background:var(--border); color:var(--muted); cursor:default; }
    .nav-btn.sec {
      background:var(--pale); color:var(--dark);

            <div class="result-row"><span class="result-file">src/utils/searchFilter.ts</span><span class="result-desc">Case-insensitive name filter · 5 tests</span><span class="result-pass">5/5 PASS</span></div>
            <div class="result-row"><span class="result-file">src/hooks/useGeolocation.ts</span><span class="result-desc">idle/loading/granted/denied/unavailable · 4 tests</span><span class="result-pass">4/4 PASS</span></div>
          </div>
        </div>

        <div class="substep">
          <div class="substep-title">TASK-005–007 — Component &amp; Pages (Wave 2 &amp; 3)</div>
          <div class="cmd-block">
            <pre><span class="t-cmt">// src/pages/dining/index.tsx  (listing page)</span>
<span class="t-key">export default function</span> DiningPage() {
  <span class="t-key">const</span> [query, setQuery] = useState(<span class="t-str">''</span>);
  <span class="t-key">const</span> { state, coords, request } = useGeolocation();
  <span class="t-key">const</span> filtered = searchFilter(restaurants, query);
  <span class="t-key">const</span> sorted = state === <span class="t-str">'granted'</span>
    ? sortByDistance(filtered, coords) : filtered;
  <span class="t-key">return</span> (
    &lt;Page&gt;
      &lt;SearchInput value={query} onChange={setQuery} /&gt;
      &lt;NearMeButton onClick={request} state={state} /&gt;
      {sorted.map(r =&gt; &lt;RestaurantCard key={r.id} {...r} /&gt;)}
    &lt;/Page&gt;
  );
}</pre>
          </div>
          <div class="result-grid">
            <div class="result-row"><span class="result-file">src/components/dining/RestaurantCard.tsx</span><span class="result-desc">UIKit card · TagInLineCashBack · distance prop</span><span class="result-pass">PASS</span></div>
            <div class="result-row"><span class="result-file">src/pages/dining/index.tsx</span><span class="result-desc">listing page · search · near me · empty state · 7 tests</span><span class="result-pass">7/7 PASS</span></div>
            <div class="result-row"><span class="result-file">src/pages/dining/[id].tsx</span><span class="result-desc">detail page · not-found handling · back link · 3 tests</span><span class="result-pass">3/3 PASS</span></div>
          </div>
        </div>
      `
    },

    // ── QUIZ 3 ───────────────────────────────────────────────────
    {
      type:'quiz', id:'q3',
      title:'Checkpoint — Steps 6–9',
      desc:'Final check on UI design and implementation',
      questions:[
        {
          q:'What development methodology does forge:ui apply during implementation?',
          opts:['BDD — write scenarios first','TDD — write tests first, confirm red, then implement','Waterfall — full design before any code','No methodology — just implement'],
          answer:1,
          explain:'forge:ui uses TDD: tests are written first, confirmed to fail for the right reason, then the implementation is added to make them pass.'
        },
        {
          q:'When a user clicks "Near Me" and location is denied, what should the UI show?',
          opts:[
            'A hard error modal blocking the page',
            'Nothing — silently fail',
            'Inline message "Location unavailable" and listing in default (alphabetical) order',
            'Redirect to a location settings page'
          ],
          answer:2,
          explain:'Per BR-4 and the UI spec: show a non-blocking inline message and fall back to alphabetical order. Never block the user.'
        },
        {
          q:'Which wave does the RestaurantCard component belong to?',
          opts:['Wave 1 — Foundation','Wave 2 — Components','Wave 3 — Pages','It has no wave'],
          answer:1,
          explain:'TASK-005 (RestaurantCard) is Wave 2. Wave 1 is data + utilities + hooks; Wave 3 is the pages that consume the card.'
        }
      ]
    },

    // ── COMPLETE ──────────────────────────────────────────────────
    { type:'complete', title:'Complete' },
  ];

  // ═══════════════════════════════════════════════════════════════
  // STATE
  // ═══════════════════════════════════════════════════════════════
  let current  = 0;
  let doneSet  = new Set(JSON.parse(localStorage.getItem('lnl_done') || '[]'));
  let quizAnswers = JSON.parse(localStorage.getItem('lnl_quiz') || '{}');

  function saveDone()  { localStorage.setItem('lnl_done', JSON.stringify([...doneSet])); }
  function saveQuiz()  { localStorage.setItem('lnl_quiz', JSON.stringify(quizAnswers)); }

  // ═══════════════════════════════════════════════════════════════
  // BUILD
  // ═══════════════════════════════════════════════════════════════
  function build() {
    const area = document.getElementById('slide-area');
    const list = document.getElementById('sidebar-list');
    document.getElementById('tot-slides').textContent = slides.length;

    slides.forEach((s, i) => {
      const el = document.createElement('div');
      el.className = 'slide' + (i === 0 ? ' active' + (s.type === 'welcome' ? ' welcome-active' : '') : '');
      el.id = 'slide-' + i;
      el.innerHTML = renderSlide(s, i);
      area.appendChild(el);

      const li = document.createElement('div');
      li.className = 'sb-item' + (i === 0 ? ' active' : '') + (doneSet.has(i) ? ' done' : '');
      li.id = 'sb-' + i;
      li.onclick = () => goTo(i);

      let dotContent, labelText, subText;
      if (s.type === 'welcome')   { dotContent='★'; labelText='Welcome';       subText='Start here'; }
      else if (s.type === 'complete'){ dotContent='✦'; labelText='All Done';   subText='Certificate'; }
      else if (s.type === 'quiz') { dotContent='?'; labelText='Checkpoint';    subText=s.title; }
      else                        { dotContent=s.num; labelText='Step '+s.num; subText=s.title; }

      li.innerHTML = `
        <div class="sb-dot"><span class="sb-num">${dotContent}</span></div>
        <div>
          <div class="sb-label">${labelText}</div>
          <div class="sb-sublabel">${subText}</div>
        </div>`;
      list.appendChild(li);
    });

    updateNav();
    updateProgress();
  }

  // ═══════════════════════════════════════════════════════════════
  // RENDER
  // ═══════════════════════════════════════════════════════════════
  function renderSlide(s, idx) {
    if (s.type === 'welcome') {
      // Build outline rows from slides (steps + quizzes + cert)
      const stepSlides = slides.filter(x => x.type === 'step');
      const quizSlides = slides.filter(x => x.type === 'quiz');
      const stepMins   = [12, 8, 10, 8, 6, 12, 8, 6, 14]; // per step
      const totalMins  = stepMins.reduce((a,b) => a+b, 0);

      // Group: steps 1-3, quiz1, steps 4-5, quiz2, steps 6-9, quiz3, cert
      const groups = [
        { num:1, title:'Clone the Repo & Initialize Forge', mins: stepMins[0]+stepMins[1], quiz:true },
        { num:2, title:'Create Effort & Elaborate Requirements', mins: stepMins[2]+stepMins[3], quiz:true },
        { num:3, title:'Classify, Design UI & Commit', mins: stepMins[4]+stepMins[5]+stepMins[6], quiz:true },
        { num:4, title:'Plan & Implement', mins: stepMins[7]+stepMins[8], quiz:false },
      ];

      const outlineRows = groups.map((g,i) => `
        <div class="outline-item" onclick="nextSlide()">
          <div class="oi-num">${g.num}</div>
          <div class="oi-body">
            <div class="oi-title">${g.title}</div>
            <div class="oi-meta">${g.mins} min${g.quiz ? ' &bull; Includes quiz' : ''}</div>
          </div>
          <span class="oi-arrow">›</span>
        </div>`).join('');

      return `<div class="welcome-slide">
        <div class="wl-left">
          <div class="wl-eyebrow">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
            LUNCH &amp; LEARN
          </div>
          <h1>Dining Web<br>Expansion</h1>
          <p>A step-by-step guide to building the Dining Cash Back experience on rakuten.com using the Forge framework inside Claude Code.</p>
          <div class="wl-meta">
            <div class="wl-meta-item">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
              ${totalMins} minutes
            </div>
            <div class="wl-meta-item">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="14.5 17.5 3 6 3 3 6 3 17.5 14.5"/><line x1="13" y1="19" x2="19" y2="13"/><line x1="16" y1="16" x2="20" y2="20"/><line x1="19" y1="21" x2="21" y2="19"/></svg>
              Certificate
            </div>
          </div>
          <button class="btn-begin" onclick="nextSlide()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            Begin Tutorial
          </button>
          <div class="wl-autosave">Your progress is saved automatically</div>
        </div>
        <div class="wl-right">
          <div class="wl-outline-label">COURSE OUTLINE</div>
          <div class="outline-list">
            ${outlineRows}
            <div class="outline-item cert-item">
              <div class="oi-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"><polyline points="14.5 17.5 3 6 3 3 6 3 17.5 14.5"/><line x1="13" y1="19" x2="19" y2="13"/><line x1="16" y1="16" x2="20" y2="20"/><line x1="19" y1="21" x2="21" y2="19"/></svg>
              </div>
              <div class="oi-body">
                <div class="oi-title">Completion Certificate</div>
                <div class="oi-meta">Awarded after completing all lessons</div>
              </div>
            </div>
          </div>
        </div>
      </div>`;
    }

    if (s.type === 'complete') {
      const total  = slides.filter(x => x.type === 'step').length;
      const quizzes = slides.filter(x => x.type === 'quiz').length;
      return `<div class="complete-slide">
        <div class="complete-emoji">🎉</div>
        <h1>All Done!</h1>
        <p>You've walked through the complete Forge workflow — from repo init to a fully tested dining feature.</p>
        <div class="stats-row">
          <div class="stat-box"><div class="stat-num">${total}</div><div class="stat-label">Steps</div></div>
          <div class="stat-box"><div class="stat-num">${quizzes}</div><div class="stat-label">Quizzes</div></div>
          <div class="stat-box"><div class="stat-num">24</div><div class="stat-label">Tests Passing</div></div>
          <div class="stat-box"><div class="stat-num">7</div><div class="stat-label">Tasks Done</div></div>
        </div>
        <div class="success-box" style="text-align:left;margin-bottom:1rem;">
          <strong>Branch:</strong> <code>feat/dining-experience-on-web-for-rakutencom</code><br>
          <strong>Phase:</strong> implementation complete · 24/24 tests pass · 6 suites · 0 failures
        </div>
        <div class="cert-section">
          <h3>📜 Download Your Certificate of Completion</h3>
          <div class="cert-name-row">
            <input type="text" class="cert-name-input" id="cert-name" placeholder="Enter your full name" maxlength="60" />
            <button class="btn-download-cert" onclick="downloadCert()">⬇ Download PDF</button>
          </div>
          <p style="font-size:.75rem;color:var(--muted);">Enter your name above and click Download — a PNG certificate will save to your Downloads folder.</p>
        </div>
        <button class="btn-primary" onclick="goTo(0)" style="margin-top:.5rem;background:var(--pale);color:var(--dark);border:1px solid var(--border2);box-shadow:none;">↩ Start Over</button>
      </div>`;
    }

    if (s.type === 'quiz') {
      return renderQuiz(s, idx);
    }

    return `<div class="step-slide">
      <div class="step-header">
        <div class="step-badge">${s.num}</div>
        <div class="step-title">
          <h2>${s.title}</h2>
          <p>${s.desc}</p>
        </div>
      </div>
      ${s.content}
      <div style="margin-top:1.5rem;text-align:right;">
        <button class="btn-primary" onclick="markDone(${idx})" id="done-btn-${idx}"
          style="${doneSet.has(idx) ? 'background:var(--pale);color:var(--dark);border:1px solid var(--border2);box-shadow:none;' : ''}">
          ${doneSet.has(idx) ? '✓ Marked Complete' : 'Mark Step Complete'}
        </button>
      </div>
    </div>`;
  }

  function renderQuiz(s, idx) {
    const saved = quizAnswers[s.id] || {};
    const submitted = saved.submitted;
    let score = 0;

    const qHTML = s.questions.map((q, qi) => {
      const chosen = saved[qi];
      const isSubmitted = submitted;

      const optsHTML = q.opts.map((opt, oi) => {
        let cls = 'quiz-opt';
        if (isSubmitted) {
          if (oi === q.answer) cls += ' correct';
          else if (oi === chosen && oi !== q.answer) cls += ' wrong';
          else if (oi === chosen) cls += ' selected';
        } else {
          if (oi === chosen) cls += ' selected';
        }
        const letter = String.fromCharCode(65 + oi);
        return `<div class="${cls}" onclick="${isSubmitted ? '' : `pickOpt('${s.id}',${qi},${oi},${idx})`}">
          <div class="opt-letter">${letter}</div>
          <span>${opt}</span>
        </div>`;
      }).join('');

      if (isSubmitted && chosen === q.answer) score++;
      const fb = isSubmitted
        ? `<div class="quiz-feedback ${chosen === q.answer ? 'ok' : 'err'} show">
            ${chosen === q.answer ? '✓ Correct — ' : '✗ Incorrect — '}${q.explain}
           </div>` : '';

      return `<div class="quiz-q" id="${s.id}-q${qi}">
        <p>${qi+1}. ${q.q}</p>
        <div class="quiz-options">${optsHTML}</div>
        ${fb}
      </div>`;
    }).join('');

    const scoreHTML = submitted
      ? `<div class="quiz-score show"><div class="score-num">${score}/${s.questions.length}</div><div class="score-label">Score</div></div>` : '';

    const btnHTML = submitted
      ? `<button class="quiz-submit" disabled>Submitted</button>`
      : `<button class="quiz-submit" id="${s.id}-submit" onclick="submitQuiz('${s.id}',${idx})" ${Object.keys(saved).length < s.questions.length ? 'disabled' : ''}>Submit Answers</button>`;

    return `<div class="quiz-slide">
      <div class="quiz-header">
        <div class="quiz-badge">❓</div>
        <div>
          <h2>${s.title}</h2>
          <p>${s.desc}</p>
        </div>
      </div>
      ${qHTML}
      ${btnHTML}
      ${scoreHTML}
    </div>`;
  }

  // ═══════════════════════════════════════════════════════════════
  // QUIZ LOGIC
  // ═══════════════════════════════════════════════════════════════
  function pickOpt(qid, qi, oi, slideIdx) {
    if (!quizAnswers[qid]) quizAnswers[qid] = {};
    quizAnswers[qid][qi] = oi;
    saveQuiz();

    // Update option visuals
    const slide = slides[slideIdx];
    const opts = document.querySelectorAll(`#${qid}-q${qi} .quiz-opt`);
    opts.forEach((el, i) => {
      el.classList.toggle('selected', i === oi);
    });

    // Enable submit if all answered
    const allAnswered = slide.questions.every((_, i) => quizAnswers[qid][i] !== undefined);
    const btn = document.getElementById(`${qid}-submit`);
    if (btn) btn.disabled = !allAnswered;
  }

  function submitQuiz(qid, slideIdx) {
    if (!quizAnswers[qid]) return;
    quizAnswers[qid].submitted = true;
    saveQuiz();

    // Re-render quiz slide
    const slide = slides[slideIdx];
    const el = document.getElementById('slide-' + slideIdx);
    el.innerHTML = renderQuiz(slide, slideIdx);

    markDone(slideIdx);
  }

  // ═══════════════════════════════════════════════════════════════
  // PROGRESS
  // ═══════════════════════════════════════════════════════════════
  function markDone(idx) {
    doneSet.add(idx);
    saveDone();

    // Update sidebar
    const sb = document.getElementById('sb-' + idx);
    if (sb) sb.classList.add('done');

    // Update button
    const btn = document.getElementById('done-btn-' + idx);
    if (btn) {
      btn.textContent = '✓ Marked Complete';
      btn.style.cssText = 'background:var(--pale);color:var(--dark);border:1px solid var(--border2);box-shadow:none;';
    }

    updateProgress();
    showToast('Step marked complete!');
  }

  function updateProgress() {
    const completable = slides.filter((s,i) => s.type === 'step' || s.type === 'quiz').length;
    const done = slides.filter((s,i) => (s.type === 'step' || s.type === 'quiz') && doneSet.has(i)).length;
    const pct = completable > 0 ? Math.round((done / completable) * 100) : 0;
    document.getElementById('progress-pct').textContent = pct + '%';
    document.getElementById('progress-fill').style.width = pct + '%';
  }

  // ═══════════════════════════════════════════════════════════════
  // NAVIGATION
  // ═══════════════════════════════════════════════════════════════
  function goTo(idx) {
    if (idx < 0 || idx >= slides.length) return;
    const prevEl = document.getElementById('slide-' + current);
    prevEl.classList.remove('active', 'welcome-active');
    document.getElementById('sb-' + current)?.classList.remove('active');
    current = idx;
    const curEl = document.getElementById('slide-' + current);
    curEl.classList.add('active');
    if (slides[current].type === 'welcome') curEl.classList.add('welcome-active');
    const sb = document.getElementById('sb-' + current);
    sb?.classList.add('active');
    sb?.scrollIntoView({ block:'nearest' });
    updateNav();
  }

  function nextSlide() { goTo(current + 1); }
  function prevSlide() { goTo(current - 1); }

  function updateNav() {
    const isWelcome = slides[current].type === 'welcome';
    document.getElementById('cur-slide').textContent = current + 1;
    document.getElementById('prev-btn').disabled = current === 0;
    document.getElementById('next-btn').disabled = current === slides.length - 1;
    document.getElementById('next-btn').textContent = current === slides.length - 2 ? 'Finish →' : 'Next →';
    document.querySelector('.header').style.display  = isWelcome ? 'none' : '';
    document.querySelector('.nav-bar').style.display = isWelcome ? 'none' : '';
    document.getElementById('sidebar').style.display = isWelcome ? 'none' : '';
    document.getElementById('expand-btn').style.display = isWelcome ? 'none' : '';
  }

  // ═══════════════════════════════════════════════════════════════
  // SIDEBAR
  // ═══════════════════════════════════════════════════════════════
  function toggleSidebar() {
    const sb = document.getElementById('sidebar');
    const eb = document.getElementById('expand-btn');
    const c = sb.classList.toggle('collapsed');
    eb.classList.toggle('visible', c);
  }

  // ═══════════════════════════════════════════════════════════════
  // COPY
  // ═══════════════════════════════════════════════════════════════
  function copyText(btn, text) {
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      showToast('Copied to clipboard!');
      setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
    });
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  // ═══════════════════════════════════════════════════════════════
  // CERTIFICATE DOWNLOAD
  // ═══════════════════════════════════════════════════════════════
  function downloadCert() {
    const name = document.getElementById('cert-name')?.value.trim();
    if (!name) { showToast('Please enter your name first'); return; }

    const canvas = document.getElementById('cert-canvas');
    const ctx = canvas.getContext('2d');
    const W = 1200, H = 850;

    // Background
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, W, H);

    // Outer border
    ctx.strokeStyle = '#000000';
    ctx.lineWidth = 10;
    ctx.strokeRect(28, 28, W - 56, H - 56);

    // Inner border
    ctx.lineWidth = 2;
    ctx.strokeStyle = '#555555';
    ctx.strokeRect(48, 48, W - 96, H - 96);

    // Header band
    ctx.fillStyle = '#111111';
    ctx.fillRect(28, 28, W - 56, 100);

    // Header text
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 28px -apple-system, Helvetica, Arial, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('RAKUTEN REWARDS · LUNCH & LEARN', W / 2, 90);

    // Title
    ctx.fillStyle = '#111111';
    ctx.font = 'bold 58px -apple-system, Helvetica, Arial, sans-serif';
    ctx.fillText('Certificate of Completion', W / 2, 235);

    // Divider
    ctx.strokeStyle = '#bbbbbb';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(200, 265); ctx.lineTo(W - 200, 265); ctx.stroke();

    // Body text
    ctx.fillStyle = '#444444';
    ctx.font = '26px -apple-system, Helvetica, Arial, sans-serif';
    ctx.fillText('This is to certify that', W / 2, 330);

    // Name
    ctx.fillStyle = '#000000';
    ctx.font = 'bold 56px -apple-system, Helvetica, Arial, sans-serif';
    ctx.fillText(name, W / 2, 415);

    // Underline name
    const nameW = ctx.measureText(name).width;
    ctx.strokeStyle = '#111111';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(W/2 - nameW/2, 428); ctx.lineTo(W/2 + nameW/2, 428); ctx.stroke();

    // Body
    ctx.fillStyle = '#444444';
    ctx.font = '26px -apple-system, Helvetica, Arial, sans-serif';
    ctx.fillText('has successfully completed the', W / 2, 490);

    ctx.fillStyle = '#000000';
    ctx.font = 'bold 32px -apple-system, Helvetica, Arial, sans-serif';
    ctx.fillText('Dining Web Expansion — Forge Walkthrough', W / 2, 545);

    ctx.fillStyle = '#444444';
    ctx.font = '22px -apple-system, Helvetica, Arial, sans-serif';
    ctx.fillText('covering Forge framework, work effort management,', W / 2, 590);
    ctx.fillText('UI design, TDD implementation, and 9-step prompt guide', W / 2, 620);

    // Date
    ctx.fillStyle = '#777777';
    ctx.font = '20px -apple-system, Helvetica, Arial, sans-serif';
    ctx.fillText(new Date().toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' }), W / 2, 690);

    // Footer band
    ctx.fillStyle = '#f2f2f2';
    ctx.fillRect(48, H - 130, W - 96, 82);
    ctx.strokeStyle = '#e0e0e0';
    ctx.lineWidth = 1;
    ctx.strokeRect(48, H - 130, W - 96, 82);

    ctx.fillStyle = '#555555';
    ctx.font = '17px -apple-system, Helvetica, Arial, sans-serif';
    ctx.fillText('Rakuten Rewards · AI-Accelerated Engineering · Forge Framework v0.9.0', W / 2, H - 80);

    // Download
    const link = document.createElement('a');
    link.download = `LunchLearn_Certificate_${name.replace(/\s+/g,'_')}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
    showToast('Certificate downloaded!');
  }

  // ═══════════════════════════════════════════════════════════════
  // KEYBOARD
  // ═══════════════════════════════════════════════════════════════
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    if (e.key === 'ArrowRight') nextSlide();
    if (e.key === 'ArrowLeft')  prevSlide();
  });

  build();
  </script>
</body>
</html>
