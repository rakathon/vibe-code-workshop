<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dining Web Expansion — Lunch &amp; Learn</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #f7f7f7;
      --surface: #ffffff;
      --surface2: #fafafa;
      --border: #e0e0e0;
      --border2: #bbbbbb;
      --text: #111111;
      --muted: #777777;
      --pale: #f2f2f2;
      --black: #000000;
      --dark: #111111;
      --mid: #333333;
      --light: #666666;
    }

    html,
    body {
      height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ══ HEADER ══════════════════════════════════════════════════════════════ */
    .header {
      background: linear-gradient(135deg, #000 0%, #1a1a1a 60%, #3a3a3a 100%);
      padding: 0.9rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }

    .header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url('data:image/svg+xml,<svg width="60" height="60" xmlns="http://www.w3.org/2000/svg"><circle cx="30" cy="30" r="1.2" fill="rgba(255,255,255,0.1)"/></svg>');
      pointer-events: none;
      animation: bgmove 25s linear infinite;
    }

    @keyframes bgmove {
      from {
        background-position: 0 0
      }

      to {
        background-position: 60px 60px
      }
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      position: relative;
      z-index: 1;
    }

    .header-emoji {
      font-size: 1.8rem;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0)
      }

      50% {
        transform: translateY(-4px)
      }
    }

    .header-title {
      color: #fff;
      font-size: 1.1rem;
      font-weight: 700;
    }

    .header-sub {
      color: rgba(255, 255, 255, .75);
      font-size: 0.75rem;
      margin-top: 1px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      position: relative;
      z-index: 1;
    }

    .h-pill {
      background: rgba(255, 255, 255, .18);
      border: 1px solid rgba(255, 255, 255, .25);
      color: #fff;
      padding: 0.3rem 0.85rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .h-pill.progress-pill {
      min-width: 120px;
    }

    .progress-bar-wrap {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: rgba(255, 255, 255, .15);
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #888, #fff);
      transition: width .35s ease;
    }

    /* ══ LAYOUT ══════════════════════════════════════════════════════════════ */
    .layout {
      display: flex;
      flex: 1;
      min-height: 0;
      position: relative;
    }

    /* ══ SIDEBAR ══════════════════════════════════════════════════════════════ */
    .sidebar {
      width: 300px;
      min-width: 180px;
      max-width: 520px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: width .3s ease;
      position: relative;
    }

    .sidebar.collapsed {
      width: 0 !important;
      border-right: none;
    }

    .sidebar.collapsed .sidebar-resizer {
      display: none;
    }

    /* drag handle */
    .sidebar-resizer {
      position: absolute;
      top: 0;
      right: -3px;
      width: 6px;
      height: 100%;
      cursor: col-resize;
      z-index: 20;
      background: transparent;
    }

    .sidebar-resizer:hover,
    .sidebar-resizer.dragging {
      background: var(--border2);
    }

    .sidebar-head {
      padding: .8rem 1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface2);
      flex-shrink: 0;
    }

    .sidebar-head h3 {
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .09em;
      text-transform: uppercase;
      color: var(--dark);
    }

    .collapse-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 5px;
      cursor: pointer;
      padding: 2px 6px;
      color: var(--muted);
      font-size: .75rem;
      transition: all .15s;
    }

    .collapse-btn:hover {
      background: var(--pale);
      color: var(--dark);
      border-color: var(--dark);
    }

    .sidebar-list {
      overflow-y: auto;
      flex: 1;
      padding: .4rem 0;
    }

    .sidebar-list::-webkit-scrollbar {
      width: 4px;
    }

    .sidebar-list::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 2px;
    }

    .sb-item {
      display: flex;
      align-items: flex-start;
      gap: .55rem;
      padding: .55rem 1rem;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: all .15s;
      overflow: hidden;
    }

    .sb-item:hover {
      background: var(--pale);
      border-left-color: var(--light);
    }

    .sb-item.active {
      background: var(--pale);
      border-left-color: var(--dark);
    }

    .sb-item.done {
      border-left-color: #16a34a;
    }

    .sb-dot {
      flex-shrink: 0;
      width: 20px;
      height: 20px;
      border-radius: 3px;
      background: var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .62rem;
      font-weight: 700;
      color: var(--muted);
      margin-top: 1px;
      transition: all .2s;
    }

    .sb-item.active .sb-dot {
      background: var(--dark);
      color: #fff;
    }

    .sb-item.done .sb-dot {
      background: #16a34a;
      color: #fff;
    }

    .sb-item.done .sb-dot::after {
      content: '✓';
      font-size: .65rem;
    }

    .sb-item.done .sb-dot .sb-num {
      display: none;
    }

    .sb-label {
      font-size: .78rem;
      color: var(--text);
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sb-sublabel {
      font-size: .68rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Section headers in sidebar */
    .sb-section {
      padding: .65rem 1rem .3rem;
      font-size: .62rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      border-top: 1px solid var(--border);
      margin-top: .3rem;
      user-select: none;
    }

    .sb-section:first-child {
      border-top: none;
      margin-top: 0;
    }

    /* Sub-step items (indented, grayed) — collapsed by default */
    .sb-item.substep {
      padding-left: 2rem;
      opacity: 0;
      height: 0;
      padding-top: 0;
      padding-bottom: 0;
      margin: 0;
      overflow: hidden;
      border: none !important;
      pointer-events: none;
      transition: height .25s ease, opacity .2s, padding .25s ease;
    }

    .sb-item.substep.expanded {
      height: 44px;
      padding-top: .55rem;
      padding-bottom: .55rem;
      opacity: .55;
      border-left: 3px solid transparent !important;
      pointer-events: auto;
    }

    .sb-item.substep.expanded:hover {
      opacity: 1;
    }

    .sb-item.substep.expanded.active {
      opacity: 1;
      border-left-color: var(--dark) !important;
    }

    .sb-item.substep.expanded.done {
      opacity: 1;
      border-left-color: #16a34a !important;
    }

    .sb-item.substep .sb-dot {
      width: 16px;
      height: 16px;
      font-size: .55rem;
      border-radius: 2px;
    }

    /* Locked sidebar items */
    .sb-item.locked {
      opacity: .3;
      cursor: not-allowed;
      pointer-events: none;
    }

    /* chevron on parent step items that have substeps */
    .sb-item .sb-chevron {
      margin-left: auto;
      font-size: .65rem;
      color: var(--muted);
      transition: transform .25s ease;
      flex-shrink: 0;
    }

    .sb-item.expanded-parent .sb-chevron {
      transform: rotate(90deg);
    }

    .expand-btn {
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 44px;
      background: var(--dark);
      border: none;
      border-radius: 0 5px 5px 0;
      color: #fff;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: .65rem;
      z-index: 10;
      box-shadow: 2px 0 8px rgba(0, 0, 0, .2);
    }

    .expand-btn.visible {
      display: flex;
    }

    /* ══ SLIDE AREA ══════════════════════════════════════════════════════════ */
    .slide-area {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    .slide {
      position: absolute;
      inset: 0;
      overflow-y: auto;
      padding: 2rem 2.5rem 5rem;
      display: none;
      animation: fadeIn .22s ease;
    }

    .slide.active {
      display: block;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(6px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .slide::-webkit-scrollbar {
      width: 5px;
    }

    .slide::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 3px;
    }

    /* ══ WELCOME ══════════════════════════════════════════════════════════════ */
    .welcome-slide {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      height: 100%;
      min-height: 100%;
    }

    /* override the slide padding for welcome only */
    .slide.welcome-active {
      padding: 0 !important;
      overflow: hidden !important;
    }

    .wl-left {
      padding: 5rem 4rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      border-right: 1px solid var(--border);
    }

    .wl-eyebrow {
      display: flex;
      align-items: center;
      gap: .5rem;
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }

    .wl-eyebrow svg {
      flex-shrink: 0;
    }

    .wl-left h1 {
      font-size: 3rem;
      font-weight: 800;
      color: var(--dark);
      line-height: 1.1;
      margin-bottom: 1.25rem;
      letter-spacing: -.5px;
    }

    .wl-left p {
      font-size: .97rem;
      color: var(--muted);
      line-height: 1.65;
      max-width: 380px;
      margin-bottom: 2rem;
    }

    .wl-meta {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .wl-meta-item {
      display: flex;
      align-items: center;
      gap: .4rem;
      font-size: .85rem;
      color: var(--text);
    }

    .wl-meta-item svg {
      color: var(--muted);
      flex-shrink: 0;
    }

    .btn-begin {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      background: var(--dark);
      color: #fff;
      font-size: .9rem;
      font-weight: 700;
      padding: .75rem 1.6rem;
      border-radius: 9px;
      border: none;
      cursor: pointer;
      transition: opacity .2s;
      width: fit-content;
    }

    .btn-begin:hover {
      opacity: .82;
    }

    .wl-autosave {
      margin-top: .9rem;
      font-size: .75rem;
      color: var(--muted);
    }

    .wl-right {
      padding: 4rem 3.5rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .wl-outline-label {
      font-size: .68rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.25rem;
    }

    .outline-list {
      display: flex;
      flex-direction: column;
      gap: .65rem;
    }

    .outline-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: .95rem 1.1rem;
      cursor: pointer;
      transition: border-color .15s, box-shadow .15s;
      text-decoration: none;
      color: inherit;
    }

    .outline-item:hover {
      border-color: var(--border2);
      box-shadow: 0 2px 10px rgba(0, 0, 0, .06);
    }

    .outline-item.cert-item {
      border-style: dashed;
    }

    .oi-num {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: var(--pale);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .82rem;
      font-weight: 700;
      color: var(--dark);
      flex-shrink: 0;
    }

    .oi-icon {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: var(--pale);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .oi-body {
      flex: 1;
    }

    .oi-title {
      font-size: .92rem;
      font-weight: 600;
      color: var(--dark);
      margin-bottom: .18rem;
    }

    .oi-meta {
      font-size: .75rem;
      color: var(--muted);
    }

    .oi-arrow {
      color: var(--border2);
      font-size: 1rem;
      margin-left: auto;
      flex-shrink: 0;
    }

    .badge-pill {
      display: inline-block;
      background: var(--dark);
      color: #fff;
      font-size: .62rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      padding: 3px 13px;
      border-radius: 999px;
      margin-bottom: 1.25rem;
    }

    .btn-primary {
      display: inline-block;
      background: var(--dark);
      color: #fff;
      font-size: .92rem;
      font-weight: 700;
      padding: .7rem 2.25rem;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      transition: opacity .2s, transform .15s;
      box-shadow: 0 4px 14px rgba(0, 0, 0, .18);
    }

    .btn-primary:hover {
      opacity: .85;
      transform: translateY(-2px);
    }

    .btn-skip {
      display: inline-block;
      background: transparent;
      color: var(--muted);
      font-size: .82rem;
      font-weight: 600;
      padding: .6rem 1.25rem;
      border-radius: 999px;
      border: 1px solid var(--border2);
      cursor: pointer;
      transition: color .2s, border-color .2s;
    }
    .btn-skip:hover { color: var(--text); border-color: var(--muted); }

    /* ══ STEP SLIDE ══════════════════════════════════════════════════════════ */
    .step-slide {
      max-width: 800px;
      margin: 0 auto;
    }

    .step-header {
      display: flex;
      align-items: center;
      gap: .85rem;
      margin-bottom: 1.4rem;
    }

    .step-badge {
      flex-shrink: 0;
      width: 42px;
      height: 42px;
      border-radius: 6px;
      background: var(--dark);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.05rem;
      font-weight: 800;
      color: #fff;
      box-shadow: 0 4px 12px rgba(0, 0, 0, .2);
    }

    .step-title h2 {
      font-size: 1.28rem;
      font-weight: 700;
      color: var(--text);
    }

    .step-title p {
      font-size: .82rem;
      color: var(--muted);
      margin-top: 2px;
    }

    /* ══ BLOCKS ══════════════════════════════════════════════════════════════ */
    .info-box {
      background: var(--pale);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: .85rem 1rem;
      margin: .9rem 0;
      font-size: .84rem;
      color: var(--text);
      line-height: 1.6;
    }

    .info-box strong {
      color: var(--dark);
    }

    .success-box {
      background: var(--pale);
      border: 1px solid var(--border2);
      border-left: 4px solid var(--dark);
      border-radius: 0 9px 9px 0;
      padding: .85rem 1rem;
      margin: .9rem 0;
      font-size: .84rem;
      color: var(--text);
      line-height: 1.6;
    }

    .cmd-block {
      background: #111;
      border-radius: 9px;
      padding: .9rem 1.1rem;
      margin: .9rem 0;
      position: relative;
      box-shadow: 0 4px 14px rgba(0, 0, 0, .18);
      display: flex;
      align-items: flex-start;
      gap: 0;
      overflow: hidden;
    }

    .cmd-block pre {
      color: #e0e0e0;
      font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
      font-size: .82rem;
      white-space: pre;
      line-height: 1.65;
      flex: 1;
      min-width: 0;
      overflow-x: auto;
    }

    /* ── Syntax highlight tokens inside cmd-block ── */
    .t-cmd {
      color: #fff;
      font-weight: 600;
    }

    .t-flag {
      color: #aaa;
    }

    .t-str {
      color: #d0d0d0;
      font-style: italic;
    }

    .t-cmt {
      color: #555;
      font-style: italic;
    }

    .t-key {
      color: #ccc;
      font-weight: 600;
    }

    .t-bullet { color: #a78bfa; }
    .t-skill  { color: #f59e0b; font-weight: 600; }
    .t-tool   { color: #a78bfa; font-weight: 600; }
    .t-muted  { color: #6b7280; }
    .t-user   { color: #60a5fa; font-weight: 600; }

    .typing-cursor {
      display: inline-block;
      color: #aaa;
      animation: blink .9s step-end infinite;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0
      }
    }

    .copy-btn {
      position: sticky;
      right: .55rem;
      top: .55rem;
      align-self: flex-start;
      flex-shrink: 0;
      background: rgba(255, 255, 255, .12);
      border: 1px solid rgba(255, 255, 255, .2);
      color: rgba(255, 255, 255, .8);
      border-radius: 5px;
      padding: 2px 9px;
      font-size: .68rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
      margin-left: .5rem;
    }

    .copy-btn:hover {
      background: rgba(255, 255, 255, .22);
      color: #fff;
    }

    .copy-btn.copied {
      background: #333;
      color: #fff;
      border-color: #333;
    }

    /* prompt block (Claude input) */
    .prompt-block {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-left: 4px solid var(--dark);
      border-radius: 0 9px 9px 0;
      padding: .85rem 1rem;
      margin: .9rem 0;
      position: relative;
    }

    .prompt-label {
      font-size: .65rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--dark);
      margin-bottom: .45rem;
    }

    .prompt-block p {
      font-size: .88rem;
      color: var(--text);
      line-height: 1.6;
      padding-right: 3.5rem;
    }

    .prompt-block .copy-btn {
      background: var(--pale);
      border: 1px solid var(--border2);
      color: var(--dark);
    }

    .prompt-block .copy-btn:hover {
      background: var(--dark);
      color: #fff;
      border-color: var(--dark);
    }

    .prompt-block .copy-btn.copied {
      background: #111;
      color: #fff;
      border-color: #111;
    }

    .forge-cmd {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      background: var(--dark);
      color: #fff;
      font-family: 'SF Mono', monospace;
      font-size: .85rem;
      font-weight: 600;
      padding: .38rem .95rem;
      border-radius: 7px;
      margin: .45rem 0;
    }

    /* dialog table */
    .dialog-table {
      width: 100%;
      border-collapse: collapse;
      margin: .7rem 0;
      font-size: .82rem;
    }

    .dialog-table th {
      background: var(--pale);
      color: var(--dark);
      padding: .45rem .75rem;
      text-align: left;
      font-size: .68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      border-bottom: 1px solid var(--border);
    }

    .dialog-table td {
      padding: .5rem .75rem;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
      line-height: 1.5;
    }

    .dialog-table tr:last-child td {
      border-bottom: none;
    }

    .dialog-table .prompt-col {
      color: var(--muted);
      font-style: italic;
      font-size: .8rem;
    }

    .dialog-table .answer-col code {
      background: var(--dark);
      color: #fff;
      padding: 1px 7px;
      border-radius: 4px;
      font-size: .77rem;
      font-weight: 600;
    }

    /* result rows */
    .result-grid {
      display: flex;
      flex-direction: column;
      gap: .35rem;
      margin: .7rem 0;
    }

    .result-row {
      display: flex;
      align-items: baseline;
      gap: .7rem;
      font-size: .8rem;
      padding: .28rem 0;
      border-bottom: 1px solid var(--border);
    }

    .result-row:last-child {
      border-bottom: none;
    }

    .result-file {
      font-family: 'SF Mono', monospace;
      font-size: .75rem;
      color: var(--dark);
      min-width: 270px;
      flex-shrink: 0;
    }

    .result-desc {
      color: var(--muted);
      flex: 1;
    }

    .result-pass {
      font-size: .67rem;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 999px;
      background: var(--pale);
      color: var(--dark);
      border: 1px solid var(--border2);
      white-space: nowrap;
    }

    /* substep card */
    .substep {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.15rem;
      margin: .9rem 0;
    }

    .substep-title {
      font-size: .78rem;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--dark);
      margin-bottom: .7rem;
      display: flex;
      align-items: center;
      gap: .4rem;
    }

    .substep-title::before {
      content: '';
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--dark);
      flex-shrink: 0;
    }

    hr.div {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.1rem 0;
    }

    /* ══ QUIZ ════════════════════════════════════════════════════════════════ */
    .quiz-slide {
      max-width: 680px;
      margin: 0 auto;
    }

    .quiz-header {
      display: flex;
      align-items: center;
      gap: .7rem;
      margin-bottom: 1.3rem;
    }

    .quiz-badge {
      width: 38px;
      height: 38px;
      border-radius: 6px;
      background: var(--dark);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }

    .quiz-header h2 {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--dark);
    }

    .quiz-header p {
      font-size: .8rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .quiz-q {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.1rem 1.25rem;
      margin: .85rem 0;
    }

    .quiz-q p {
      font-size: .9rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: .8rem;
    }

    .quiz-options {
      display: flex;
      flex-direction: column;
      gap: .45rem;
    }

    .quiz-opt {
      display: flex;
      align-items: center;
      gap: .6rem;
      padding: .55rem .85rem;
      border: 1.5px solid var(--border);
      border-radius: 7px;
      cursor: pointer;
      font-size: .85rem;
      color: var(--text);
      transition: all .15s;
      background: var(--surface);
      user-select: none;
    }

    .quiz-opt:hover {
      border-color: var(--border2);
      background: var(--pale);
    }

    .quiz-opt.selected {
      border-color: var(--dark);
      background: var(--pale);
      font-weight: 600;
    }

    .quiz-opt.correct {
      border-color: var(--dark);
      background: #e8e8e8;
    }

    .quiz-opt.wrong {
      border-color: #999;
      background: #f5f5f5;
      opacity: .6;
    }

    .quiz-opt code {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: .8rem;
      background: #e8e4f0;
      color: #5b21b6;
      padding: 1px 5px;
      border-radius: 4px;
    }

    .quiz-opt .opt-letter {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 1.5px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .7rem;
      font-weight: 700;
      flex-shrink: 0;
      transition: all .15s;
    }

    .quiz-opt.selected .opt-letter {
      background: var(--dark);
      color: #fff;
      border-color: var(--dark);
    }

    .quiz-opt.correct .opt-letter {
      background: var(--dark);
      color: #fff;
      border-color: var(--dark);
    }

    .quiz-feedback code {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: .78rem;
      background: rgba(0,0,0,.08);
      padding: 1px 5px;
      border-radius: 4px;
    }

    .quiz-feedback {
      margin-top: .7rem;
      padding: .65rem .9rem;
      border-radius: 7px;
      font-size: .82rem;
      font-weight: 600;
      display: none;
    }

    .quiz-feedback.show {
      display: block;
    }

    .quiz-feedback.ok {
      background: #e8e8e8;
      color: var(--dark);
      border: 1px solid var(--border2);
    }

    .quiz-feedback.err {
      background: #f5f5f5;
      color: #555;
      border: 1px solid var(--border);
    }

    .quiz-submit {
      margin-top: 1rem;
      background: var(--dark);
      color: #fff;
      border: none;
      border-radius: 999px;
      padding: .6rem 1.8rem;
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s;
    }

    .quiz-submit:hover {
      opacity: .85;
    }

    .quiz-submit:disabled {
      background: var(--border);
      color: var(--muted);
      cursor: default;
    }

    .quiz-score {
      margin-top: 1rem;
      padding: .8rem 1rem;
      border-radius: 9px;
      text-align: center;
      background: var(--pale);
      border: 1px solid var(--border2);
      display: none;
    }

    .quiz-score.show {
      display: block;
    }

    .quiz-score .score-num {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--dark);
    }

    .quiz-score .score-label {
      font-size: .75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .07em;
    }

    /* ══ COMPLETE ════════════════════════════════════════════════════════════ */
    .complete-slide {
      max-width: 640px;
      margin: 1.5rem auto;
      text-align: center;
    }

    .complete-emoji {
      font-size: 3.5rem;
      margin-bottom: .9rem;
    }

    .complete-slide h1 {
      font-size: 2rem;
      font-weight: 800;
      color: var(--dark);
      margin-bottom: .7rem;
    }

    .complete-slide>p {
      color: var(--muted);
      font-size: .95rem;
      margin-bottom: 1.5rem;
    }

    .stats-row {
      display: flex;
      justify-content: center;
      gap: 1.25rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .stat-box {
      background: var(--pale);
      border: 1px solid var(--border2);
      border-radius: 10px;
      padding: .85rem 1.35rem;
      min-width: 90px;
    }

    .stat-num {
      font-size: 1.7rem;
      font-weight: 800;
      color: var(--dark);
    }

    .stat-label {
      font-size: .68rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .07em;
      margin-top: 2px;
    }

    /* Certificate section */
    .cert-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin: 1.25rem 0;
      text-align: left;
    }

    .cert-section h3 {
      font-size: .85rem;
      font-weight: 700;
      margin-bottom: .75rem;
      color: var(--dark);
    }

    .cert-name-row {
      display: flex;
      gap: .6rem;
      margin-bottom: .75rem;
    }

    .cert-name-input {
      flex: 1;
      padding: .6rem .85rem;
      border: 1.5px solid var(--border);
      border-radius: 7px;
      font-size: .9rem;
      color: var(--text);
      outline: none;
      transition: border-color .15s;
      background: var(--surface);
    }

    .cert-name-input:focus {
      border-color: var(--dark);
    }

    .cert-name-input::placeholder {
      color: #bbb;
    }

    .btn-download-cert {
      background: var(--dark);
      color: #fff;
      border: none;
      border-radius: 7px;
      padding: .6rem 1.25rem;
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity .2s;
      display: flex;
      align-items: center;
      gap: .4rem;
    }

    .btn-download-cert:hover {
      opacity: .85;
    }

    /* ══ CERTIFICATE CANVAS (hidden, used for download) ══════════════════════ */
    #cert-canvas {
      display: none;
    }

    /* ══ NAV BAR ══════════════════════════════════════════════════════════════ */
    .nav-bar {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: .65rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      box-shadow: 0 -2px 10px rgba(0, 0, 0, .04);
    }

    .nav-btn {
      background: var(--dark);
      color: #fff;
      border: none;
      border-radius: 999px;
      padding: .5rem 1.5rem;
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s, transform .15s;
    }

    .nav-btn:hover:not(:disabled) {
      opacity: .85;
      transform: translateY(-1px);
    }

    .nav-btn:disabled {
      background: var(--border);
      color: var(--muted);
      cursor: default;
    }

    .nav-btn.sec {
      background: var(--pale);
      color: var(--dark);
      border: 1px solid var(--border2);
    }

    .nav-btn.sec:hover:not(:disabled) {
      background: var(--border);
    }

    .nav-hint {
      font-size: .72rem;
      color: var(--muted);
    }

    /* ══ TOAST ════════════════════════════════════════════════════════════════ */
    .toast {
      position: fixed;
      bottom: 5rem;
      left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: var(--dark);
      color: #fff;
      padding: .55rem 1.3rem;
      border-radius: 999px;
      font-size: .8rem;
      font-weight: 600;
      opacity: 0;
      pointer-events: none;
      transition: all .22s ease;
      z-index: 9999;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>

<body>

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <span class="header-emoji">🍽️</span>
      <div>
        <div class="header-title">Dining Web Expansion</div>
        <div class="header-sub">Lunch &amp; Learn · Forge Walkthrough</div>
      </div>
    </div>
    <div class="header-right">
      <div class="h-pill">Step <span id="cur-slide">1</span> / <span id="tot-slides">—</span></div>
      <div class="h-pill progress-pill">Progress: <span id="progress-pct">0%</span></div>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>

  <!-- Layout -->
  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-resizer" id="sidebar-resizer"></div>
      <div class="sidebar-head">
        <h3>Steps</h3>
        <button class="collapse-btn" onclick="toggleSidebar()">◀</button>
      </div>
      <div class="sidebar-list" id="sidebar-list"></div>
    </aside>
    <button class="expand-btn" id="expand-btn" onclick="toggleSidebar()">▶</button>
    <div class="slide-area" id="slide-area"></div>
  </div>


  <!-- Footer -->
  <div id="site-footer"
    style="text-align:center;padding:.55rem;font-size:.72rem;color:#aaa;flex-shrink:0;background:var(--bg);">
    🌿 Platform Engineering Trainings 🌿 &nbsp;·&nbsp; © Rakuten Rewards
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Hidden canvas for certificate -->
  <canvas id="cert-canvas" width="1200" height="900"></canvas>

  <script>
    // ═══════════════════════════════════════════════════════════════
    // SLIDE DATA
    // ═══════════════════════════════════════════════════════════════
    // Section definitions — maps slide index ranges to section labels
    // Built after slides array is defined (see buildSections())
    const SECTIONS = [
      { label: 'Section 1: Getting Started', slideIds: ['step-1'] },
      { label: 'Section 2: Create a Forge Work Effort', slideIds: ['step-2'] },
      { label: 'Section 3: Elaborate Requirements', slideIds: ['step-3'] },
      { label: 'Section 4: Promote & Implement', slideIds: ['step-4', 'step-5', 'step-6'] },
    ];

    // Sub-steps that live under a parent step (displayed indented + grayed in sidebar)
    const SUBSTEPS = {
      'step-2': [
        { id: 's2-1', label: '2.1 — Repository Type' },
        { id: 's2-2', label: '2.2 — Legacy Repository Check' },
        { id: 's2-3', label: '2.3 — Brownfield Analysis' },
        { id: 's2-4', label: '2.4 — Branch Naming Convention' },
        { id: 's2-5', label: '2.5 — Directory & File Creation' },
        { id: 's2-6', label: '2.6 — Confirm & Commit' },
      ],
      'step-2': [
        { id: 's3-1', label: '3.1 — Select Work Item Type' },
        { id: 's3-2', label: '3.2 — Select Risk Level' },
        { id: 's3-3', label: '3.3 — Skip Jira Association' },
        { id: 's3-4', label: '3.4 — Allow Branch Creation' },
        { id: 's3-5', label: '3.5 — Allow Effort Scaffold Commit' },
        { id: 's3-6', label: '3.6 — Effort Creation Complete' },
      ],
    };

    const slides = [

      // ── WELCOME ──────────────────────────────────────────────────
      { type: 'welcome', title: 'Welcome' },

      // ── STEP 1 ───────────────────────────────────────────────────
      {
        type: 'step', num: '1', id: 'step-1',
        title: 'Clone the Repo', desc: 'Get the codebase onto your machine',
        content: `
        <p style="font-size:.95rem;color:var(--muted);margin-bottom:.75rem;">Clone the lunch &amp; learn repo and switch into it.</p>
        <div class="cmd-block">
          <pre><span class="t-cmd">git</span> clone https://github.com/rewards-guilds/rr-lunchnlearn-web.git <span class="t-flag">&amp;&amp;</span> <span class="t-cmd">cd</span> rr-lunchnlearn-web</pre>
          <button class="copy-btn" onclick="copyText(this,'git clone https://github.com/rewards-guilds/rr-lunchnlearn-web.git && cd rr-lunchnlearn-web')">Copy</button>
        </div>
        <div style="margin-top:1.1rem;padding:14px 18px;background:rgba(124,58,237,0.07);border:1px solid rgba(124,58,237,0.25);border-radius:10px;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;">
          <div>
            <p style="font-size:.85rem;font-weight:600;color:var(--dark);margin-bottom:3px;">No git access?</p>
            <p style="font-size:.8rem;color:var(--muted);">Download the zip, unzip it, then <code>cd rr-lunchnlearn-web-main</code> in your terminal.</p>
          </div>
          <a href="rr-lunchnlearn-web-main.zip" download="rr-lunchnlearn-web-main.zip"
             style="display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:999px;background:linear-gradient(135deg,#5b21b6,#7c3aed);color:#fff;font-size:.82rem;font-weight:600;text-decoration:none;white-space:nowrap;flex-shrink:0;">
            &#8659; Download ZIP
          </a>
        </div>
      `
      },

      // ── STEP 1.1 ─────────────────────────────────────────────────
      {
        type: 'substep', num: '1.1', parentId: 'step-1', id: 'step-1-1',
        title: 'Set Up the Forge Status Line', desc: 'Keep effort context visible in Claude Code',
        content: `
        <p style="font-size:.95rem;color:var(--muted);margin-bottom:.9rem;">The Forge status line shows your active effort, current phase, cost of session, model, current directory and risk level directly in the Claude Code interface. This keeps both you and the AI oriented throughout the session — you always know which effort is active and which phase you are in without having to ask.</p>
        <p style="font-size:.95rem;color:var(--muted);margin-bottom:.75rem;">First, open Claude Code in your terminal:</p>
        <div class="cmd-block">
          <pre><span class="t-cmd typing-text" data-type-text="claude"></span></pre>
          <button class="copy-btn" onclick="copyText(this,'claude')">Copy</button>
        </div>
        <p style="font-size:.95rem;color:var(--muted);margin:.9rem 0 .75rem;">Then run once to set up the status line:</p>
        <div class="cmd-block">
          <pre><span class="t-cmd typing-text" data-type-text="/forge:statusline"></span></pre>
          <button class="copy-btn" onclick="copyText(this,'/forge:statusline')">Copy</button>
        </div>
        <p style="font-size:.88rem;color:var(--muted);margin:.9rem 0 .5rem;">After setup, the status line will display context like <em>(e.g. not exactly the same)</em>:</p>
        <div class="cmd-block" style="font-size:.78rem;">
          <pre style="white-space:pre;line-height:1.6;"><span class="t-key">❯</span>
<span class="t-str">──────────────────────────────────────────────────────────────────────────────────────────────────</span>
    <span class="t-flag">🌿 main</span> | <span class="t-num">$0.11 16m19s</span> | <span class="t-cmd">Sonnet 4.6</span> | <span class="t-key">📁 rr-lunchnlearn-web</span> | <span class="t-str">█░░░░░░░░░ 14% context</span></pre>
        </div>
      `
      },

      // ── STEP 1.2 ─────────────────────────────────────────────────
      {
        type: 'substep', num: '1.2', parentId: 'step-1', markComplete: true,
        title: 'Select Model — Sonnet 1M Context', desc: 'Switch to the long-context model for this session',
        content: `
        <p style="font-size:.95rem;color:var(--muted);margin-bottom:.75rem;">Run the model picker to switch to Sonnet with 1M context — this keeps the full effort context in memory throughout the workshop session.</p>
        <div class="cmd-block">
          <pre><span class="t-cmd typing-text" data-type-text="/model"></span></pre>
          <button class="copy-btn" onclick="copyText(this,'/model')">Copy</button>
        </div>
        <p style="font-size:.95rem;color:var(--muted);margin:.9rem 0 .5rem;">Claude Code will show the model picker. Select option 3:</p>
        <div class="cmd-block" style="font-size:.8rem;">
          <pre style="line-height:1.7;"><span class="t-key">❯ /model</span>

<span class="t-str">──────────────────────────────────────────────────────────────────────────────────────────────────────────</span>
  <span class="t-key">Select model</span>
  Switch between Claude models. Applies to this session and future Claude Code sessions. For
  other/previous model names, specify with --model.

    <span class="t-muted">1. Default                Use the default model (currently Sonnet 4.5)</span>
    <span class="t-muted">2. Sonnet                 Sonnet 4.6 · Best for everyday tasks</span>
  <span class="t-str">❯ 3. Sonnet (1M context) ✔  Sonnet 4.6 for long sessions</span>
    <span class="t-muted">4. Opus 4.1               Opus 4.1 · Legacy</span>
    <span class="t-muted">5. Opus 4.7               Opus 4.7 · Most capable for complex work</span>
    <span class="t-muted">6. Opus 4.7 (1M context)  Opus 4.7 for long sessions</span>
    <span class="t-muted">7. Opus 4.6               Opus 4.6 · Most capable for complex work</span>
    <span class="t-muted">8. Opus 4.6 (1M context)  Opus 4.6 for long sessions</span>
    <span class="t-muted">9. Haiku                  Haiku 4.5 · Fastest for quick answers</span>

  <span class="t-flag">● High effort (default)</span> <span class="t-muted">← → to adjust</span>

  <span class="t-muted">Enter to confirm · Esc to exit</span></pre>
        </div>
        <p style="font-size:.95rem;color:var(--muted);margin-top:.75rem;">Use arrow keys to highlight <strong>3. Sonnet (1M context)</strong> and press <kbd style="background:#222;border:1px solid #555;border-radius:3px;padding:1px 6px;font-size:.78rem;">Enter</kbd> to confirm.</p>
      `
      },

      // ── STEP 2 ───────────────────────────────────────────────────
      {
        type: 'step', num: '2', id: 'step-2',
        title: 'Create a Work Effort', desc: 'Run /forge:effort',
        content: `
        <p style="font-size:.93rem;color:var(--muted);line-height:1.7;margin-bottom:.9rem;"><code>/forge:effort</code> registers a new work item inside the <code>.forge/</code> workspace. Each feature, bug fix, or investigation in Forge is tracked as an effort with a title, type (epic, story, task, etc.), risk level, and its own folder for requirements, specs, and plans. This command creates that folder, assigns a unique ID based on the title, creates a dedicated git branch, and commits the scaffold atomically, so the effort is tracked in version control immediately. Run it <strong>once per feature</strong> at the start of work.</p>
        <p style="font-size:.93rem;color:var(--muted);margin-bottom:.6rem;">Type this in Claude Code:</p>
        <div class="cmd-block">
          <pre><span class="t-str typing-text" data-type-text="let's work on a new project called &quot;dining experience for web&quot;"></span></pre>
          <button class="copy-btn" data-copy="let's work on a new project called &quot;dining experience for web&quot;" onclick="copyText(this, this.dataset.copy)">Copy</button>
        </div>
        <p style="font-size:.88rem;color:var(--muted);margin:.75rem 0 .5rem;">Forge picks up the project name from your message and skips asking for a title — it will ask all other questions as usual.</p>
        <p style="font-size:.88rem;color:var(--muted);margin:.75rem 0 .4rem;">Claude will respond with something like:</p>
        <div class="cmd-block" style="font-size:.82rem;">
          <pre style="line-height:1.7;"><span class="t-flag">Skill(forge:effort)</span>
  <span class="t-str">⎿  Successfully loaded skill</span>
<span class="t-muted" style="color:#6b7280;">Forge is initialized and no collision. The effort ID will be:</span> <span class="t-key">dining-experience-for-web</span></pre>
        </div>
        <div class="success-box" style="margin-top:.75rem;">
          <strong>Note:</strong> This step will load the <code>forge:effort</code> skill. If it doesn't, add <code>/forge:effort</code> to your prompt.
        </div>
      `
      },

      // ── STEP 3.1 ─────────────────────────────────────────────────

  <span class="t-muted">⎿  Successfully loaded skill</span>

  <span class="t-muted">Searched for 1 pattern (ctrl+o to expand)</span>

<span class="t-bullet">⏺</span> Web platform detected. Loading standards and guides now.
  <span class="t-muted">···</span>

<span class="t-muted">···</span></pre></div>
      `
      },

      // ── QUIZ 3 ───────────────────────────────────────────────────
      {
        type: 'quiz', id: 'q1',
        title: 'Checkpoint — Steps 4–6',
        desc: 'Final check on UI design and implementation',
        questions: [
          {
            q: 'What does forge:ui do?',
            opts: [
              'Generate standards-compliant UI code using the Rakuten Rewards design system',
              'Create a Figma design file from requirements',
              'Run unit tests on existing UI components',
              'Scaffold a new Next.js project'
            ],
            answer: 0,
            explain: '<code>forge:ui</code> generates standards-compliant UI code using the Rakuten Rewards design system, applying TDD mode and UIKit guides throughout implementation.'
          },
          {
            q: 'Which command conversationally authors a UI spec (ui-spec.md) by walking the engineer through goal, mode, scope, data, and mode-specific details?',
            opts: [
              '<code>forge:ui</code>',
              '<code>forge:plan</code>',
              '<code>forge:ui-design</code>',
              '<code>forge:elaborate</code>'
            ],
            answer: 2,
            explain: '<code>forge:ui-design</code> conversationally authors the UI spec by walking through goal, mode, scope, data, and mode-specific details — producing <code>spec/ui-spec.md</code>.'
          },
          {
            q: 'When a Forge effort is active, which skill generates a structured plan from discovery artifacts?',
            opts: [
              '<code>forge:elaborate</code>',
              '<code>forge:plan</code>',
              '<code>forge:ui</code>',
              '<code>forge:promote</code>'
            ],
            answer: 1,
            explain: '<code>forge:plan</code> reads discovery artifacts (BRs, TRs, UI spec) and generates a structured task plan organized into waves, ready for wave-by-wave execution.'
          }
        ]
      },

      // ── COMPLETE ──────────────────────────────────────────────────
      { type: 'complete', title: 'Complete' },
    ];

    // ═══════════════════════════════════════════════════════════════
    // STATE
    // ═══════════════════════════════════════════════════════════════
    let current = 0;
    let doneSet = new Set(JSON.parse(localStorage.getItem('lnl_done') || '[]'));
    let quizAnswers = JSON.parse(localStorage.getItem('lnl_quiz') || '{}');
    let maxReached = parseInt(localStorage.getItem('lnl_reached') || '0', 10);

    function saveDone() { localStorage.setItem('lnl_done', JSON.stringify([...doneSet])); }
    function saveQuiz() { localStorage.setItem('lnl_quiz', JSON.stringify(quizAnswers)); }
    function saveReached() { localStorage.setItem('lnl_reached', maxReached); }

    // ═══════════════════════════════════════════════════════════════
    // BUILD
    // ═══════════════════════════════════════════════════════════════
    function build() {
      const area = document.getElementById('slide-area');
      const list = document.getElementById('sidebar-list');
      document.getElementById('tot-slides').textContent = slides.length;

      // Track which section we last emitted to avoid duplicate headers
      const sectionBySlideId = {};
      SECTIONS.forEach(sec => sec.slideIds.forEach(sid => sectionBySlideId[sid] = sec.label));
      const emittedSections = new Set();

      slides.forEach((s, i) => {
        // ── Slide element ──
        const el = document.createElement('div');
        el.className = 'slide' + (i === 0 ? ' active' + (s.type === 'welcome' ? ' welcome-active' : '') : '');
        el.id = 'slide-' + i;
        el.innerHTML = renderSlide(s, i);
        area.appendChild(el);

        // ── Sidebar: inject section header if needed ──
        if (s.id && sectionBySlideId[s.id] && !emittedSections.has(sectionBySlideId[s.id])) {
          const secEl = document.createElement('div');
          secEl.className = 'sb-section';
          secEl.textContent = sectionBySlideId[s.id];
          list.appendChild(secEl);
          emittedSections.add(sectionBySlideId[s.id]);
        }

        // ── Sidebar: main item ──
        const li = document.createElement('div');
        li.className = 'sb-item' + (i === 0 ? ' active' : '') + (doneSet.has(i) ? ' done' : '');
        li.id = 'sb-' + i;
        li.onclick = () => goTo(i);

        const hasChildren = s.type === 'step' && s.id && slides.some(x => x.type === 'substep' && x.parentId === s.id);
        let dotContent, labelText, subText, isSubstep = false;
        if (s.type === 'welcome') { dotContent = '★'; labelText = 'Welcome'; subText = 'Start here'; }
        else if (s.type === 'complete') { dotContent = '✦'; labelText = 'All Done'; subText = 'Certificate'; }
        else if (s.type === 'quiz') { dotContent = '?'; labelText = 'Checkpoint'; subText = s.title; }
        else if (s.type === 'substep') { dotContent = s.num; labelText = s.num + ' — ' + s.title; subText = s.desc || ''; isSubstep = true; }
        else { dotContent = s.num; labelText = 'Step ' + s.num + (s.optional ? ' <span style="font-size:.6rem;opacity:.55;font-weight:400;letter-spacing:.04em;">[optional]</span>' : ''); subText = s.title; }

        if (isSubstep) li.classList.add('substep');

        li.innerHTML = `
        <div class="sb-dot"><span class="sb-num">${dotContent}</span></div>
        <div style="flex:1;min-width:0;">
          <div class="sb-label">${labelText}</div>
          ${subText ? `<div class="sb-sublabel">${subText}</div>` : ''}
        </div>
        ${hasChildren ? '<span class="sb-chevron">›</span>' : ''}`;
        list.appendChild(li);

        // ── Sidebar: decorative sub-step items for steps WITHOUT real substep slides ──
        if (s.id && SUBSTEPS[s.id] && !slides.some(x => x.type === 'substep' && x.parentId === s.id)) {
          SUBSTEPS[s.id].forEach(sub => {
            const subLi = document.createElement('div');
            subLi.className = 'sb-item substep';
            subLi.innerHTML = `
            <div class="sb-dot"><span class="sb-num">·</span></div>
            <div>
              <div class="sb-label">${sub.label}</div>
            </div>`;
            list.appendChild(subLi);
          });
        }
      });

      updateNav();
      updateProgress();
      updateSidebarLocks();
    }

    // ═══════════════════════════════════════════════════════════════
    // RENDER
    // ═══════════════════════════════════════════════════════════════
    function renderSlide(s, idx) {
      if (s.type === 'welcome') {
        // Build outline rows from slides (steps + quizzes + cert)
        const stepSlides = slides.filter(x => x.type === 'step');
        const quizSlides = slides.filter(x => x.type === 'quiz');
        const totalMins = 45;

        const groups = [
          { num: 1, title: 'Getting Started', mins: 10, quiz: true },
          { num: 2, title: 'Create a Forge Work Effort', mins: 10, quiz: false },
          { num: 3, title: 'Elaborate Requirements', mins: 10, quiz: true },
          { num: 4, title: 'Promote & Implement', mins: 15, quiz: true },
        ];

        const outlineRows = groups.map((g, i) => `
        <div class="outline-item" onclick="goToSection(${i})" style="cursor:pointer;">
          <div class="oi-num">${g.num}</div>
          <div class="oi-body">
            <div class="oi-title">${g.title}</div>
            <div class="oi-meta">${g.mins} min${g.quiz ? ' &bull; Includes quiz' : ''}</div>
          </div>
          <span class="oi-arrow">›</span>
        </div>`).join('');

        return `<div class="welcome-slide">
        <div class="wl-left">
          <div class="wl-eyebrow">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
            LUNCH &amp; LEARN
          </div>
          <h1>Dining Web<br>Expansion</h1>
          <p>A step-by-step guide to building the Dining Cash Back experience on rakuten.com using the Forge framework inside Claude Code.</p>
          <div class="wl-meta">
            <div class="wl-meta-item">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
              ${totalMins} minutes
            </div>
            <div class="wl-meta-item">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="14.5 17.5 3 6 3 3 6 3 17.5 14.5"/><line x1="13" y1="19" x2="19" y2="13"/><line x1="16" y1="16" x2="20" y2="20"/><line x1="19" y1="21" x2="21" y2="19"/></svg>
              Certificate
            </div>
          </div>
          <button class="btn-begin" onclick="nextSlide()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            Begin Tutorial
          </button>
          <div class="wl-autosave">Your progress is saved automatically</div>
        </div>
        <div class="wl-right">
          <div class="wl-outline-label">COURSE OUTLINE</div>
          <div class="outline-list">
            ${outlineRows}
            <div class="outline-item cert-item">
              <div class="oi-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"><polyline points="14.5 17.5 3 6 3 3 6 3 17.5 14.5"/><line x1="13" y1="19" x2="19" y2="13"/><line x1="16" y1="16" x2="20" y2="20"/><line x1="19" y1="21" x2="21" y2="19"/></svg>
              </div>
              <div class="oi-body">
                <div class="oi-title">Completion Certificate</div>
                <div class="oi-meta">Awarded after completing all lessons</div>
              </div>
            </div>
          </div>
        </div>
      </div>`;
      }

      if (s.type === 'complete') {
        const total = slides.filter(x => x.type === 'step').length;
        const quizzes = slides.filter(x => x.type === 'quiz').length;
        return `<div class="complete-slide">
        <div class="complete-emoji">🎉</div>
        <h1>All Done!</h1>
        <p>You've walked through the complete Forge workflow — from repo init to a fully tested dining feature.</p>
        <div class="stats-row">
          <div class="stat-box"><div class="stat-num">${total}</div><div class="stat-label">Steps</div></div>
          <div class="stat-box"><div class="stat-num">${quizzes}</div><div class="stat-label">Quizzes</div></div>
          <div class="stat-box"><div class="stat-num">24</div><div class="stat-label">Tests Passing</div></div>
          <div class="stat-box"><div class="stat-num">7</div><div class="stat-label">Tasks Done</div></div>
        </div>
        <div class="cert-section">
          <h3>📜 Download Your Certificate of Completion</h3>
          <div class="cert-name-row">
            <input type="text" class="cert-name-input" id="cert-name" placeholder="Enter your full name" maxlength="60" />
            <button class="btn-download-cert" onclick="downloadCert()">⬇ Download PDF</button>
          </div>
          <p style="font-size:.75rem;color:var(--muted);">Enter your name above and click Download — a PNG certificate will save to your Downloads folder.</p>
        </div>
        <button class="btn-primary" onclick="goTo(0)" style="margin-top:.5rem;background:var(--pale);color:var(--dark);border:1px solid var(--border2);box-shadow:none;">↩ Start Over</button>
      </div>`;
      }

      if (s.type === 'quiz') {
        return renderQuiz(s, idx);
      }

      if (s.type === 'substep') {
        const isLast = s.markComplete === true;
        const btnHTML = isLast
          ? `<button class="btn-primary" onclick="markDone(${idx})" id="done-btn-${idx}">
            ${doneSet.has(idx) ? '<span style="color:#16a34a;font-size:1rem;">✓</span> Marked Complete' : 'Mark as Complete'}
           </button>`
          : `<button class="btn-primary" onclick="nextSlide()">Next Lesson →</button>`;
        return `<div class="step-slide">
        <div class="step-header">
          <div class="step-badge" style="font-size:.75rem;width:36px;height:36px;">${s.num}</div>
          <div class="step-title">
            <h2>${s.title}</h2>
            <p>${s.desc || ''}</p>
          </div>
        </div>
        ${s.content}
        <div style="margin-top:1.5rem;text-align:right;">${btnHTML}</div>
      </div>`;
      }

      // For step slides that have substeps, show Next Lesson instead of Mark Complete
      const hasSubsteps = s.id && slides.some(x => x.type === 'substep' && x.parentId === s.id);
      const skipBtn = s.optional
        ? `<button class="btn-skip" onclick="skipStep(${idx})" title="Mark as complete and skip ahead">Skip →</button>`
        : '';
      const stepBtnHTML = hasSubsteps
        ? `<div style="display:flex;align-items:center;gap:.75rem;justify-content:flex-end;">${skipBtn}<button class="btn-primary" onclick="nextSlide()">Next Lesson →</button></div>`
        : `<div style="display:flex;align-items:center;gap:.75rem;justify-content:flex-end;">${skipBtn}<button class="btn-primary" onclick="markDone(${idx})" id="done-btn-${idx}">
          ${doneSet.has(idx) ? '<span style="color:#16a34a;font-size:1rem;">✓</span> Marked Complete' : 'Mark Step Complete'}
        </button></div>`;

      return `<div class="step-slide">
      <div class="step-header">
        <div class="step-badge">${s.num}</div>
        <div class="step-title">
          <h2>${s.title}</h2>
          <p>${s.desc}</p>
        </div>
      </div>
      ${s.content}
      <div style="margin-top:1.5rem;">${stepBtnHTML}</div>
    </div>`;
    }

    function renderQuiz(s, idx) {
      const saved = quizAnswers[s.id] || {};
      const submitted = saved.submitted;
      let score = 0;

      const qHTML = s.questions.map((q, qi) => {
        const chosen = saved[qi];
        const isSubmitted = submitted;

        const optsHTML = q.opts.map((opt, oi) => {
          let cls = 'quiz-opt';
          if (isSubmitted) {
            if (oi === q.answer) cls += ' correct';
            else if (oi === chosen && oi !== q.answer) cls += ' wrong';
            else if (oi === chosen) cls += ' selected';
          } else {
            if (oi === chosen) cls += ' selected';
          }
          const letter = String.fromCharCode(65 + oi);
          return `<div class="${cls}" onclick="${isSubmitted ? '' : `pickOpt('${s.id}',${qi},${oi},${idx})`}">
          <div class="opt-letter">${letter}</div>
          <span>${opt}</span>
        </div>`;
        }).join('');

        if (isSubmitted && chosen === q.answer) score++;
        const fb = isSubmitted
          ? `<div class="quiz-feedback ${chosen === q.answer ? 'ok' : 'err'} show">
            ${chosen === q.answer ? '✓ Correct — ' : '✗ Incorrect — '}${q.explain}
           </div>` : '';

        return `<div class="quiz-q" id="${s.id}-q${qi}">
        <p>${qi + 1}. ${q.q}</p>
        <div class="quiz-options">${optsHTML}</div>
        ${fb}
      </div>`;
      }).join('');

      const scoreHTML = submitted
        ? `<div class="quiz-score show"><div class="score-num">${score}/${s.questions.length}</div><div class="score-label">Score</div></div>` : '';

      const btnHTML = submitted
        ? `<div style="display:flex;flex-direction:column;align-items:center;gap:1rem;margin-top:1.5rem;">
            ${scoreHTML}
            <button class="btn-primary" onclick="nextSlide()">Next Lesson →</button>
           </div>`
        : `<button class="quiz-submit" id="${s.id}-submit" onclick="submitQuiz('${s.id}',${idx})" ${Object.keys(saved).length < s.questions.length ? 'disabled' : ''}>Submit Answers</button>`;

      return `<div class="quiz-slide">
      <div class="quiz-header">
        <div class="quiz-badge">❓</div>
        <div>
          <h2>${s.title}</h2>
          <p>${s.desc}</p>
        </div>
      </div>
      ${qHTML}
      ${btnHTML}
    </div>`;
    }

    // ═══════════════════════════════════════════════════════════════
    // QUIZ LOGIC
    // ═══════════════════════════════════════════════════════════════
    function pickOpt(qid, qi, oi, slideIdx) {
      if (!quizAnswers[qid]) quizAnswers[qid] = {};
      quizAnswers[qid][qi] = oi;
      saveQuiz();

      // Update option visuals
      const slide = slides[slideIdx];
      const opts = document.querySelectorAll(`#${qid}-q${qi} .quiz-opt`);
      opts.forEach((el, i) => {
        el.classList.toggle('selected', i === oi);
      });

      // Enable submit if all answered
      const allAnswered = slide.questions.every((_, i) => quizAnswers[qid][i] !== undefined);
      const btn = document.getElementById(`${qid}-submit`);
      if (btn) btn.disabled = !allAnswered;
    }

    function submitQuiz(qid, slideIdx) {
      if (!quizAnswers[qid]) return;
      quizAnswers[qid].submitted = true;
      saveQuiz();

      // Re-render quiz slide
      const slide = slides[slideIdx];
      const el = document.getElementById('slide-' + slideIdx);
      el.innerHTML = renderQuiz(slide, slideIdx);

      markDone(slideIdx);
    }

    // ═══════════════════════════════════════════════════════════════
    // PROGRESS
    // ═══════════════════════════════════════════════════════════════
    function skipStep(idx) {
      const s = slides[idx];
      // Mark the step itself done
      doneSet.add(idx);
      // Mark all its substeps done too
      if (s.id) {
        slides.forEach((sub, i) => {
          if (sub.type === 'substep' && sub.parentId === s.id) doneSet.add(i);
        });
      }
      saveDone();
      updateProgress();
      // Jump past all substeps of this step to the next step/section
      let target = idx + 1;
      if (s.id) {
        for (let i = idx + 1; i < slides.length; i++) {
          if (slides[i].type === 'substep' && slides[i].parentId === s.id) target = i + 1;
          else break;
        }
      }
      if (target > maxReached) { maxReached = target; localStorage.setItem('lnl_reached', maxReached); }
      showToast('Step skipped & marked complete');
      goTo(Math.min(target, slides.length - 1));
    }

    function markDone(idx) {
      doneSet.add(idx);
      saveDone();

      // Update sidebar item
      const sb = document.getElementById('sb-' + idx);
      if (sb) sb.classList.add('done');

      // If this is a markComplete substep, also mark the parent step done in sidebar
      const s = slides[idx];
      if (s.type === 'substep' && s.markComplete && s.parentId) {
        const parentIdx = slides.findIndex(x => x.id === s.parentId);
        if (parentIdx !== -1) {
          doneSet.add(parentIdx);
          saveDone();
          const parentSb = document.getElementById('sb-' + parentIdx);
          if (parentSb) parentSb.classList.add('done');
        }
      }

      // Update button
      const btn = document.getElementById('done-btn-' + idx);
      if (btn) {
        btn.innerHTML = '<span style="color:#16a34a;font-size:1rem;">✓</span> Marked Complete';
        btn.style.cssText = '';
      }

      updateProgress();

      // If completing a substep section, collapse substeps then jump to next non-quiz slide
      if (s && s.type === 'substep' && s.markComplete) {
        showToast('Section complete!');
        setTimeout(() => {
          let next = idx + 1;
          while (next < slides.length && slides[next].type === 'quiz') next++;
          if (next > maxReached) { maxReached = next; saveReached(); updateSidebarLocks(); }
          if (next < slides.length) goTo(next); else nextSlide();
        }, 600);
      } else {
        showToast('Step marked complete!');
        setTimeout(() => nextSlide(), 600);
      }
    }

    function isOptionalSlide(s) {
      if (s.optional) return true;
      if (s.type === 'substep' && s.parentId) {
        const parent = slides.find(x => x.id === s.parentId);
        if (parent && parent.optional) return true;
      }
      return false;
    }

    function updateProgress() {
      let completable = 0, done = 0;
      slides.forEach((s, i) => {
        if (isOptionalSlide(s)) return;
        if (s.type === 'quiz' || (s.type === 'substep' && s.markComplete)) {
          completable++;
          if (doneSet.has(i)) done++;
        }
      });
      const pct = completable > 0 ? Math.round((done / completable) * 100) : 0;
      document.getElementById('progress-pct').textContent = pct + '%';
      document.getElementById('progress-fill').style.width = pct + '%';
    }

    // ═══════════════════════════════════════════════════════════════
    // NAVIGATION
    // ═══════════════════════════════════════════════════════════════
    function goTo(idx) {
      if (idx < 0 || idx >= slides.length) return;
      if (idx > maxReached) { showToast('Complete the current step first'); return; }
      const prevEl = document.getElementById('slide-' + current);
      prevEl.classList.remove('active', 'welcome-active');
      document.getElementById('sb-' + current)?.classList.remove('active');
      current = idx;
      const curEl = document.getElementById('slide-' + current);
      curEl.classList.add('active');
      if (slides[current].type === 'welcome') curEl.classList.add('welcome-active');
      const sb = document.getElementById('sb-' + current);
      sb?.classList.add('active');
      sb?.scrollIntoView({ block: 'nearest' });
      updateSubstepExpansion();
      updateNav();
      updateProgress();
      startTypingAnimations();
    }

    function updateSidebarLocks() {
      slides.forEach((s, i) => {
        const el = document.getElementById('sb-' + i);
        if (!el) return;
        if (i > maxReached) {
          el.classList.add('locked');
        } else {
          el.classList.remove('locked');
        }
      });
    }

    function updateSubstepExpansion() {
      const cur = slides[current];
      // Determine which parentId is currently "active"
      const activeParentId = cur.type === 'substep' ? cur.parentId
        : cur.type === 'step' && slides.some(x => x.type === 'substep' && x.parentId === cur.id) ? cur.id
          : null;

      slides.forEach((s, i) => {
        if (s.type !== 'substep') return;
        const sbEl = document.getElementById('sb-' + i);
        if (!sbEl) return;
        if (s.parentId === activeParentId) {
          sbEl.classList.add('expanded');
        } else {
          sbEl.classList.remove('expanded');
        }
      });

      // Update chevron on parent items
      slides.forEach((s, i) => {
        if (s.type !== 'step') return;
        const sbEl = document.getElementById('sb-' + i);
        if (!sbEl) return;
        if (s.id === activeParentId) {
          sbEl.classList.add('expanded-parent');
        } else {
          sbEl.classList.remove('expanded-parent');
        }
      });
    }

    function nextSlide() {
      // Mark current slide done so sidebar turns green
      if (!doneSet.has(current)) {
        doneSet.add(current);
        saveDone();
        const li = document.getElementById('sb-' + current);
        if (li) li.classList.add('done');
        updateProgress();
      }
      const next = current + 1;
      if (next > maxReached) { maxReached = next; saveReached(); updateSidebarLocks(); }
      goTo(next);
    }
    function prevSlide() { goTo(current - 1); }

    function goToSection(sectionIndex) {
      const sec = SECTIONS[sectionIndex];
      if (!sec) { nextSlide(); return; }
      // Find the first slide matching this section's first slideId
      const firstId = sec.slideIds[0];
      const idx = slides.findIndex(s => s.id === firstId);
      if (idx === -1) { nextSlide(); return; }
      if (idx > maxReached) {
        showToast('Complete earlier sections first');
        return;
      }
      goTo(idx);
    }

    function updateNav() {
      const isWelcome = slides[current].type === 'welcome';
      document.getElementById('cur-slide').textContent = current + 1;
      document.querySelector('.header').style.display = isWelcome ? 'none' : '';
      document.getElementById('sidebar').style.display = isWelcome ? 'none' : '';
      document.getElementById('expand-btn').style.display = isWelcome ? 'none' : '';
      document.getElementById('site-footer').style.display = isWelcome ? 'none' : '';
      document.getElementById('support-widget').style.display = isWelcome ? 'none' : '';
    }

    // ═══════════════════════════════════════════════════════════════
    // SIDEBAR
    // ═══════════════════════════════════════════════════════════════
    function toggleSidebar() {
      const sb = document.getElementById('sidebar');
      const eb = document.getElementById('expand-btn');
      const c = sb.classList.toggle('collapsed');
      eb.classList.toggle('visible', c);
    }

    // ═══════════════════════════════════════════════════════════════
    // COPY
    // ═══════════════════════════════════════════════════════════════
    function copyText(btn, text) {
      navigator.clipboard.writeText(text).then(() => {
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        showToast('Copied to clipboard!');
        setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
      });
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2200);
    }

    // ═══════════════════════════════════════════════════════════════
    // CERTIFICATE DOWNLOAD
    // ═══════════════════════════════════════════════════════════════
    function downloadCert() {
      const name = document.getElementById('cert-name')?.value.trim();
      if (!name) { showToast('Please enter your name first'); return; }

      const canvas = document.getElementById('cert-canvas');
      const ctx = canvas.getContext('2d');
      const W = 1200, H = 900;

      // Background
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, W, H);

      // Outer border
      ctx.strokeStyle = '#000000';
      ctx.lineWidth = 10;
      ctx.strokeRect(28, 28, W - 56, H - 56);

      // Inner border
      ctx.lineWidth = 2;
      ctx.strokeStyle = '#555555';
      ctx.strokeRect(48, 48, W - 96, H - 96);

      // Header band
      ctx.fillStyle = '#111111';
      ctx.fillRect(28, 28, W - 56, 100);

      // Rakuten R logo in header (left side)
      ctx.save();
      const logoSize = 60;
      const logoX = 58;
      const logoY = 48;
      const scale = logoSize / 24;
      ctx.translate(logoX, logoY);
      ctx.scale(scale, scale);
      ctx.fillStyle = '#ffffff';
      const rPath = new Path2D('M23.277 21.3L3.939 24 .722 21.3h22.555zM7.6 19.276H3.939V0h6.052a6.653 6.653 0 0 1 6.65 6.646c0 2.234-1.108 4.204-2.799 5.418l5.418 7.211h-4.585l-4.486-5.979H7.6v5.98zm0-9.64h2.392a2.992 2.992 0 0 0 2.989-2.989 2.994 2.994 0 0 0-2.989-2.986H7.6v5.975z');
      ctx.fill(rPath);
      ctx.restore();

      // Header text
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 28px -apple-system, Helvetica, Arial, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('RAKUTEN REWARDS · LUNCH & LEARN', W / 2, 90);

      // Title
      ctx.fillStyle = '#111111';
      ctx.font = 'bold 58px -apple-system, Helvetica, Arial, sans-serif';
      ctx.fillText('Certificate of Completion', W / 2, 235);

      // Divider
      ctx.strokeStyle = '#bbbbbb';
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(200, 265); ctx.lineTo(W - 200, 265); ctx.stroke();

      // Body text
      ctx.fillStyle = '#444444';
      ctx.font = '26px -apple-system, Helvetica, Arial, sans-serif';
      ctx.fillText('This is to certify that', W / 2, 330);

      // Name
      ctx.fillStyle = '#000000';
      ctx.font = 'bold 56px -apple-system, Helvetica, Arial, sans-serif';
      ctx.fillText(name, W / 2, 415);

      // Underline name
      const nameW = ctx.measureText(name).width;
      ctx.strokeStyle = '#111111';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(W / 2 - nameW / 2, 428); ctx.lineTo(W / 2 + nameW / 2, 428); ctx.stroke();

      // Body
      ctx.fillStyle = '#444444';
      ctx.font = '26px -apple-system, Helvetica, Arial, sans-serif';
      ctx.fillText('has successfully completed the', W / 2, 490);

      ctx.fillStyle = '#000000';
      ctx.font = 'bold 32px -apple-system, Helvetica, Arial, sans-serif';
      ctx.fillText('Dining Web Expansion — Forge Walkthrough', W / 2, 545);

      ctx.fillStyle = '#444444';
      ctx.font = '22px -apple-system, Helvetica, Arial, sans-serif';
      ctx.fillText('covering Forge framework, work effort management,', W / 2, 590);
      ctx.fillText('UI design, TDD implementation, and 9-step prompt guide', W / 2, 620);

      // Date
      ctx.fillStyle = '#777777';
      ctx.font = '20px -apple-system, Helvetica, Arial, sans-serif';
      ctx.fillText(new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }), W / 2, 660);

      // ── Signature section ──
      const sigY = 715;
      const sig1X = 280; // left signature center
      const sig2X = 920; // right signature center
      const sigLineW = 220;

      function drawSignature(cx, name) {
        ctx.save();
        ctx.translate(cx, sigY - 18);
        ctx.strokeStyle = '#222';
        ctx.lineWidth = 1.8;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        if (name === 'ralph') {
          // R swoop + loop
          ctx.beginPath();
          ctx.moveTo(-48, 12); ctx.bezierCurveTo(-40, -20, -10, -28, 8, -10);
          ctx.bezierCurveTo(22, 4, 14, 18, -2, 12);
          ctx.bezierCurveTo(-14, 6, -6, -2, 12, 14);
          ctx.bezierCurveTo(28, 28, 40, 20, 52, 8);
          ctx.stroke();
          // second stroke - a underline flick
          ctx.beginPath();
          ctx.moveTo(-52, 18); ctx.bezierCurveTo(-20, 22, 20, 20, 54, 16);
          ctx.stroke();
        } else {
          // B loop + V downstroke
          ctx.beginPath();
          ctx.moveTo(-50, 14); ctx.bezierCurveTo(-44, -18, -18, -22, -4, -6);
          ctx.bezierCurveTo(10, 8, 0, 20, -10, 14);
          ctx.bezierCurveTo(-20, 8, -4, -4, 14, 10);
          ctx.bezierCurveTo(30, 22, 42, 10, 50, -8);
          ctx.stroke();
          // tail flick
          ctx.beginPath();
          ctx.moveTo(50, -8); ctx.bezierCurveTo(56, -18, 60, -10, 58, 2);
          ctx.stroke();
        }
        ctx.restore();
      }

      drawSignature(sig1X, 'ralph');
      drawSignature(sig2X, 'benjamin');

      // Signature lines
      ctx.strokeStyle = '#aaaaaa';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(sig1X - sigLineW / 2, sigY + 4); ctx.lineTo(sig1X + sigLineW / 2, sigY + 4); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(sig2X - sigLineW / 2, sigY + 4); ctx.lineTo(sig2X + sigLineW / 2, sigY + 4); ctx.stroke();

      // Signature names
      ctx.fillStyle = '#111111';
      ctx.font = 'bold 17px -apple-system, Helvetica, Arial, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('Ralph a Manna', sig1X, sigY + 26);
      ctx.fillText('Benjamin Vogan', sig2X, sigY + 26);

      ctx.fillStyle = '#777777';
      ctx.font = '14px -apple-system, Helvetica, Arial, sans-serif';
      ctx.fillText('Sr. Director, Productivity Engineering', sig1X, sigY + 44);
      ctx.fillText('Engineering Contractor', sig2X, sigY + 44);

      // Footer band
      ctx.fillStyle = '#f2f2f2';
      ctx.fillRect(48, H - 82, W - 96, 54);
      ctx.strokeStyle = '#e0e0e0';
      ctx.lineWidth = 1;
      ctx.strokeRect(48, H - 82, W - 96, 54);

      ctx.fillStyle = '#555555';
      ctx.font = '15px -apple-system, Helvetica, Arial, sans-serif';
      ctx.fillText('Rakuten Rewards · AI-Accelerated Engineering · Forge Framework v0.9.0', W / 2, H - 47);

      // Download
      const link = document.createElement('a');
      link.download = `LunchLearn_Certificate_${name.replace(/\s+/g, '_')}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
      showToast('Certificate downloaded!');
    }

    // ═══════════════════════════════════════════════════════════════
    // KEYBOARD
    // ═══════════════════════════════════════════════════════════════
    document.addEventListener('keydown', e => {
      if (e.target.tagName === 'INPUT') return;
      if (e.key === 'ArrowRight') nextSlide();
      if (e.key === 'ArrowLeft') prevSlide();
    });

    // ═══════════════════════════════════════════════════════════════
    // TYPING ANIMATION
    // ═══════════════════════════════════════════════════════════════
    function startTypingAnimations() {
      const slide = document.getElementById('slide-' + current);
      if (!slide) return;
      const els = [...slide.querySelectorAll('.typing-text[data-type-text]')].filter(el => !el.dataset.typed);
      let delay = 300;
      els.forEach(el => {
        el.dataset.typed = '1';
        const text = el.dataset.typeText;
        el.textContent = '';
        const startAt = delay;
        delay += text.length * 38 + 300;
        setTimeout(() => {
          let i = 0;
          function type() {
            if (i <= text.length) {
              el.textContent = text.slice(0, i++);
              setTimeout(type, 38);
            }
          }
          type();
        }, startAt);
      });
    }

    // ═══════════════════════════════════════════════════════════════
    // SIDEBAR RESIZE
    // ═══════════════════════════════════════════════════════════════
    (function () {
      const resizer = document.getElementById('sidebar-resizer');
      const sidebar = document.getElementById('sidebar');
      let startX, startW;

      resizer.addEventListener('mousedown', e => {
        startX = e.clientX;
        startW = sidebar.offsetWidth;
        resizer.classList.add('dragging');
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';

        function onMove(e) {
          const w = Math.min(520, Math.max(180, startW + (e.clientX - startX)));
          sidebar.style.width = w + 'px';
        }
        function onUp() {
          resizer.classList.remove('dragging');
          document.body.style.cursor = '';
          document.body.style.userSelect = '';
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
        }
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
      });
    })();

    build();
  </script>
