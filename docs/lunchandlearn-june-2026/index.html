<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forge Elaborate — Lunch &amp; Learn</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #f7f7f7;
      --surface: #ffffff;
      --surface2: #fafafa;
      --border: #e0e0e0;
      --border2: #bbbbbb;
      --text: #111111;
      --muted: #777777;
      --pale: #f2f2f2;
      --black: #000000;
      --dark: #111111;
      --mid: #333333;
      --light: #666666;
    }

    html,
    body {
      height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ══ HEADER ══════════════════════════════════════════════════════════════ */
    .header {
      background: linear-gradient(135deg, #000 0%, #1a1a1a 60%, #3a3a3a 100%);
      padding: 0.9rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }

    .header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url('data:image/svg+xml,<svg width="60" height="60" xmlns="http://www.w3.org/2000/svg"><circle cx="30" cy="30" r="1.2" fill="rgba(255,255,255,0.1)"/></svg>');
      pointer-events: none;
      animation: bgmove 25s linear infinite;
    }

    @keyframes bgmove {
      from {
        background-position: 0 0
      }

      to {
        background-position: 60px 60px
      }
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      position: relative;
      z-index: 1;
    }

    .header-emoji {
      font-size: 1.8rem;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0)
      }

      50% {
        transform: translateY(-4px)
      }
    }

    .header-title {
      color: #fff;
      font-size: 1.1rem;
      font-weight: 700;
    }

    .header-sub {
      color: rgba(255, 255, 255, .75);
      font-size: 0.75rem;
      margin-top: 1px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      position: relative;
      z-index: 1;
    }

    .h-pill {
      background: rgba(255, 255, 255, .18);
      border: 1px solid rgba(255, 255, 255, .25);
      color: #fff;
      padding: 0.3rem 0.85rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .h-pill.progress-pill {
      min-width: 120px;
    }

    .h-pill.reset-btn {
      cursor: pointer;
      background: rgba(239, 68, 68, .18);
      border-color: rgba(239, 68, 68, .4);
      color: #fca5a5;
      transition: background .2s, border-color .2s;
    }
    .h-pill.reset-btn:hover {
      background: rgba(239, 68, 68, .32);
      border-color: rgba(239, 68, 68, .65);
    }

    .progress-bar-wrap {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: rgba(255, 255, 255, .15);
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #888, #fff);
      transition: width .35s ease;
    }

    /* ══ LAYOUT ══════════════════════════════════════════════════════════════ */
    .layout {
      display: flex;
      flex: 1;
      min-height: 0;
      position: relative;
    }

    /* ══ SIDEBAR ══════════════════════════════════════════════════════════════ */
    .sidebar {
      width: 300px;
      min-width: 180px;
      max-width: 520px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: width .3s ease;
      position: relative;
    }

    .sidebar.collapsed {
      width: 0 !important;
      border-right: none;
    }

    .sidebar.collapsed .sidebar-resizer {
      display: none;
    }

    /* drag handle */
    .sidebar-resizer {
      position: absolute;
      top: 0;
      right: -3px;
      width: 6px;
      height: 100%;
      cursor: col-resize;
      z-index: 20;
      background: transparent;
    }

    .sidebar-resizer:hover,
    .sidebar-resizer.dragging {
      background: var(--border2);
    }

    .sidebar-head {
      padding: .8rem 1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface2);
      flex-shrink: 0;
    }

    .sidebar-head h3 {
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .09em;
      text-transform: uppercase;
      color: var(--dark);
    }

    .collapse-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 5px;
      cursor: pointer;
      padding: 2px 6px;
      color: var(--muted);
      font-size: .75rem;
      transition: all .15s;
    }

    .collapse-btn:hover {
      background: var(--pale);
      color: var(--dark);
      border-color: var(--dark);
    }

    .sidebar-list {
      overflow-y: auto;
      flex: 1;
      padding: .4rem 0;
    }

    .sidebar-list::-webkit-scrollbar {
      width: 4px;
    }

    .sidebar-list::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 2px;
    }

    .sb-item {
      display: flex;
      align-items: flex-start;
      gap: .55rem;
      padding: .55rem 1rem;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: all .15s;
      overflow: hidden;
    }

    .sb-item:hover {
      background: var(--pale);
      border-left-color: var(--light);
    }

    .sb-item.active {
      background: var(--pale);
      border-left-color: var(--dark);
    }

    .sb-item.done {
      border-left-color: #16a34a;
    }

    .sb-dot {
      flex-shrink: 0;
      width: 20px;
      height: 20px;
      border-radius: 3px;
      background: var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .62rem;
      font-weight: 700;
      color: var(--muted);
      margin-top: 1px;
      transition: all .2s;
    }

    .sb-item.active .sb-dot {
      background: var(--dark);
      color: #fff;
    }

    .sb-item.done .sb-dot {
      background: #16a34a;
      color: #fff;
    }

    .sb-item.done .sb-dot::after {
      content: '✓';
      font-size: .65rem;
    }

    .sb-item.done .sb-dot .sb-num {
      display: none;
    }

    .sb-label {
      font-size: .78rem;
      color: var(--text);
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sb-sublabel {
      font-size: .68rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Section headers in sidebar */
    .sb-section {
      padding: .65rem 1rem .3rem;
      font-size: .62rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      border-top: 1px solid var(--border);
      margin-top: .3rem;
      user-select: none;
    }

    .sb-section:first-child {
      border-top: none;
      margin-top: 0;
    }

    /* Sub-step items (indented, grayed) — collapsed by default */
    .sb-item.substep {
      padding-left: 2rem;
      opacity: 0;
      height: 0;
      padding-top: 0;
      padding-bottom: 0;
      margin: 0;
      overflow: hidden;
      border: none !important;
      pointer-events: none;
      transition: height .25s ease, opacity .2s, padding .25s ease;
    }

    .sb-item.substep.expanded {
      height: 44px;
      padding-top: .55rem;
      padding-bottom: .55rem;
      opacity: .55;
      border-left: 3px solid transparent !important;
      pointer-events: auto;
    }

    .sb-item.substep.expanded:hover {
      opacity: 1;
    }

    .sb-item.substep.expanded.active {
      opacity: 1;
      border-left-color: var(--dark) !important;
    }

    .sb-item.substep.expanded.done {
      opacity: 1;
      border-left-color: #16a34a !important;
    }

    .sb-item.substep .sb-dot {
      width: 16px;
      height: 16px;
      font-size: .55rem;
      border-radius: 2px;
    }

    .sb-item.knowledge .sb-dot {
      background: #fef3c7;
      color: #92400e;
      border: 1px solid #fcd34d;
      font-size: .95rem;
    }
    .sb-item.knowledge .sb-label { color: #92400e; }

    /* Locked sidebar items */
    .sb-item.locked {
      opacity: .3;
      cursor: not-allowed;
      pointer-events: none;
    }

    /* chevron on parent step items that have substeps */
    .sb-item .sb-chevron {
      margin-left: auto;
      font-size: .65rem;
      color: var(--muted);
      transition: transform .25s ease;
      flex-shrink: 0;
    }

    .sb-item.expanded-parent .sb-chevron {
      transform: rotate(90deg);
    }

    .expand-btn {
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 44px;
      background: var(--dark);
      border: none;
      border-radius: 0 5px 5px 0;
      color: #fff;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: .65rem;
      z-index: 10;
      box-shadow: 2px 0 8px rgba(0, 0, 0, .2);
    }

    .expand-btn.visible {
      display: flex;
    }

    /* ══ SLIDE AREA ══════════════════════════════════════════════════════════ */
    .slide-area {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    .slide {
      position: absolute;
      inset: 0;
      overflow-y: auto;
      padding: 2rem 2.5rem 5rem;
      display: none;
      animation: fadeIn .22s ease;
    }

    .slide.active {
      display: block;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(6px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .slide::-webkit-scrollbar {
      width: 5px;
    }

    .slide::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 3px;
    }

    /* ══ WELCOME ══════════════════════════════════════════════════════════════ */
    .welcome-slide {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      height: 100%;
      min-height: 100%;
    }

    /* override the slide padding for welcome only */
    .slide.welcome-active {
      padding: 0 !important;
      overflow: hidden !important;
    }

    .wl-left {
      padding: 5rem 4rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      border-right: 1px solid var(--border);
    }

    .wl-eyebrow {
      display: flex;
      align-items: center;
      gap: .5rem;
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }

    .wl-eyebrow svg {
      flex-shrink: 0;
    }

    .wl-left h1 {
      font-size: 3rem;
      font-weight: 800;
      color: var(--dark);
      line-height: 1.1;
      margin-bottom: 1.25rem;
      letter-spacing: -.5px;
    }

    .wl-left p {
      font-size: .97rem;
      color: var(--muted);
      line-height: 1.65;
      max-width: 380px;
      margin-bottom: 2rem;
    }

    .wl-meta {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .wl-meta-item {
      display: flex;
      align-items: center;
      gap: .4rem;
      font-size: .85rem;
      color: var(--text);
    }

    .wl-meta-item svg {
      color: var(--muted);
      flex-shrink: 0;
    }

    .btn-begin {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      background: var(--dark);
      color: #fff;
      font-size: .9rem;
      font-weight: 700;
      padding: .75rem 1.6rem;
      border-radius: 9px;
      border: none;
      cursor: pointer;
      transition: opacity .2s;
      width: fit-content;
    }

    .btn-begin:hover {
      opacity: .82;
    }

    .wl-autosave {
      margin-top: .9rem;
      font-size: .75rem;
      color: var(--muted);
    }

    .wl-right {
      padding: 4rem 3.5rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .wl-outline-label {
      font-size: .68rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.25rem;
    }

    .outline-list {
      display: flex;
      flex-direction: column;
      gap: .65rem;
    }

    .outline-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: .95rem 1.1rem;
      cursor: pointer;
      transition: border-color .15s, box-shadow .15s;
      text-decoration: none;
      color: inherit;
    }

    .outline-item:hover {
      border-color: var(--border2);
      box-shadow: 0 2px 10px rgba(0, 0, 0, .06);
    }

    .oi-num {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: var(--pale);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .82rem;
      font-weight: 700;
      color: var(--dark);
      flex-shrink: 0;
    }

    .oi-icon {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: var(--pale);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .oi-body {
      flex: 1;
    }

    .oi-title {
      font-size: .92rem;
      font-weight: 600;
      color: var(--dark);
      margin-bottom: .18rem;
    }

    .oi-meta {
      font-size: .75rem;
      color: var(--muted);
    }

    .oi-arrow {
      color: var(--border2);
      font-size: 1rem;
      margin-left: auto;
      flex-shrink: 0;
    }

    .badge-pill {
      display: inline-block;
      background: var(--dark);
      color: #fff;
      font-size: .62rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      padding: 3px 13px;
      border-radius: 999px;
      margin-bottom: 1.25rem;
    }

    .btn-primary {
      display: inline-block;
      background: var(--dark);
      color: #fff;
      font-size: .92rem;
      font-weight: 700;
      padding: .7rem 2.25rem;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      transition: opacity .2s, transform .15s;
      box-shadow: 0 4px 14px rgba(0, 0, 0, .18);
    }

    .btn-primary:hover {
      opacity: .85;
      transform: translateY(-2px);
    }

    .btn-skip {
      display: inline-block;
      background: transparent;
      color: var(--muted);
      font-size: .82rem;
      font-weight: 600;
      padding: .6rem 1.25rem;
      border-radius: 999px;
      border: 1px solid var(--border2);
      cursor: pointer;
      transition: color .2s, border-color .2s;
    }
    .btn-skip:hover { color: var(--text); border-color: var(--muted); }

    /* ══ STEP SLIDE ══════════════════════════════════════════════════════════ */
    .step-slide {
      max-width: 800px;
      margin: 0 auto;
    }

    .step-header {
      display: flex;
      align-items: center;
      gap: .85rem;
      margin-bottom: 1.4rem;
    }

    .step-badge {
      flex-shrink: 0;
      width: 42px;
      height: 42px;
      border-radius: 6px;
      background: var(--dark);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.05rem;
      font-weight: 800;
      color: #fff;
      box-shadow: 0 4px 12px rgba(0, 0, 0, .2);
    }
    .kb-badge {
      background: #fef3c7;
      box-shadow: 0 4px 12px rgba(245, 158, 11, .25);
      font-size: 1.3rem;
    }

    .step-title h2 {
      font-size: 1.28rem;
      font-weight: 700;
      color: var(--text);
    }

    .step-title p {
      font-size: .82rem;
      color: var(--muted);
      margin-top: 2px;
    }

    /* ══ BLOCKS ══════════════════════════════════════════════════════════════ */
    .info-box {
      background: var(--pale);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: .85rem 1rem;
      margin: .9rem 0;
      font-size: .84rem;
      color: var(--text);
      line-height: 1.6;
    }

    .info-box strong {
      color: var(--dark);
    }

    .success-box {
      background: var(--pale);
      border: 1px solid var(--border2);
      border-left: 4px solid var(--dark);
      border-radius: 0 9px 9px 0;
      padding: .85rem 1rem;
      margin: .9rem 0;
      font-size: .84rem;
      color: var(--text);
      line-height: 1.6;
    }

    .cmd-block {
      background: #111;
      border-radius: 9px;
      padding: .9rem 1.1rem;
      margin: .9rem 0;
      position: relative;
      box-shadow: 0 4px 14px rgba(0, 0, 0, .18);
      display: flex;
      align-items: flex-start;
      gap: 0;
      overflow: hidden;
    }

    .cmd-block pre {
      color: #e0e0e0;
      font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
      font-size: .82rem;
      white-space: pre;
      line-height: 1.65;
      flex: 1;
      min-width: 0;
      overflow-x: auto;
    }

    .cmd-block.scrollable pre {
      max-height: calc(30 * 1.353rem);
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #444 #111;
    }
    .cmd-block.scrollable pre::-webkit-scrollbar { width: 6px; }
    .cmd-block.scrollable pre::-webkit-scrollbar-track { background: #111; }
    .cmd-block.scrollable pre::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }

    /* ── Syntax highlight tokens inside cmd-block ── */
    .t-cmd {
      color: #fff;
      font-weight: 600;
    }

    .t-flag {
      color: #aaa;
    }

    .t-str {
      color: #d0d0d0;
      font-style: italic;
    }

    .t-cmt {
      color: #555;
      font-style: italic;
    }

    .t-key {
      color: #ccc;
      font-weight: 600;
    }

    .t-bullet { color: #a78bfa; }
    .t-skill  { color: #f59e0b; font-weight: 600; }
    .t-tool   { color: #a78bfa; font-weight: 600; }
    .t-muted  { color: #6b7280; }
    .t-user   { color: #60a5fa; font-weight: 600; }

    .typing-cursor {
      display: inline-block;
      color: #aaa;
      animation: blink .9s step-end infinite;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0
      }
    }

    .copy-btn {
      position: sticky;
      right: .55rem;
      top: .55rem;
      align-self: flex-start;
      flex-shrink: 0;
      background: rgba(255, 255, 255, .12);
      border: 1px solid rgba(255, 255, 255, .2);
      color: rgba(255, 255, 255, .8);
      border-radius: 5px;
      padding: 2px 9px;
      font-size: .68rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
      margin-left: .5rem;
    }

    .copy-btn:hover {
      background: rgba(255, 255, 255, .22);
      color: #fff;
    }

    .copy-btn.copied {
      background: #333;
      color: #fff;
      border-color: #333;
    }

    /* prompt block (Claude input) */
    .prompt-block {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-left: 4px solid var(--dark);
      border-radius: 0 9px 9px 0;
      padding: .85rem 1rem;
      margin: .9rem 0;
      position: relative;
    }

    .prompt-label {
      font-size: .65rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--dark);
      margin-bottom: .45rem;
    }

    .prompt-block p {
      font-size: .88rem;
      color: var(--text);
      line-height: 1.6;
      padding-right: 3.5rem;
    }

    .prompt-block .copy-btn {
      background: var(--pale);
      border: 1px solid var(--border2);
      color: var(--dark);
    }

    .prompt-block .copy-btn:hover {
      background: var(--dark);
      color: #fff;
      border-color: var(--dark);
    }

    .prompt-block .copy-btn.copied {
      background: #111;
      color: #fff;
      border-color: #111;
    }

    .forge-cmd {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      background: var(--dark);
      color: #fff;
      font-family: 'SF Mono', monospace;
      font-size: .85rem;
      font-weight: 600;
      padding: .38rem .95rem;
      border-radius: 7px;
      margin: .45rem 0;
    }

    /* dialog table */
    .dialog-table {
      width: 100%;
      border-collapse: collapse;
      margin: .7rem 0;
      font-size: .82rem;
    }

    .dialog-table th {
      background: var(--pale);
      color: var(--dark);
      padding: .45rem .75rem;
      text-align: left;
      font-size: .68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      border-bottom: 1px solid var(--border);
    }

    .dialog-table td {
      padding: .5rem .75rem;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
      line-height: 1.5;
    }

    .dialog-table tr:last-child td {
      border-bottom: none;
    }

    .dialog-table .prompt-col {
      color: var(--muted);
      font-style: italic;
      font-size: .8rem;
    }

    .dialog-table .answer-col code {
      background: var(--dark);
      color: #fff;
      padding: 1px 7px;
      border-radius: 4px;
      font-size: .77rem;
      font-weight: 600;
    }

    /* result rows */
    .result-grid {
      display: flex;
      flex-direction: column;
      gap: .35rem;
      margin: .7rem 0;
    }

    .result-row {
      display: flex;
      align-items: baseline;
      gap: .7rem;
      font-size: .8rem;
      padding: .28rem 0;
      border-bottom: 1px solid var(--border);
    }

    .result-row:last-child {
      border-bottom: none;
    }

    .result-file {
      font-family: 'SF Mono', monospace;
      font-size: .75rem;
      color: var(--dark);
      min-width: 270px;
      flex-shrink: 0;
    }

    .result-desc {
      color: var(--muted);
      flex: 1;
    }

    .result-pass {
      font-size: .67rem;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 999px;
      background: var(--pale);
      color: var(--dark);
      border: 1px solid var(--border2);
      white-space: nowrap;
    }

    /* substep card */
    .substep {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.15rem;
      margin: .9rem 0;
    }

    .substep-title {
      font-size: .78rem;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--dark);
      margin-bottom: .7rem;
      display: flex;
      align-items: center;
      gap: .4rem;
    }

    .substep-title::before {
      content: '';
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--dark);
      flex-shrink: 0;
    }

    hr.div {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.1rem 0;
    }

    /* ══ QUIZ ════════════════════════════════════════════════════════════════ */
    .quiz-slide {
      max-width: 680px;
      margin: 0 auto;
    }

    .quiz-header {
      display: flex;
      align-items: center;
      gap: .7rem;
      margin-bottom: 1.3rem;
    }

    .quiz-badge {
      width: 38px;
      height: 38px;
      border-radius: 6px;
      background: var(--dark);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }

    .quiz-header h2 {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--dark);
    }

    .quiz-header p {
      font-size: .8rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .quiz-q {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.1rem 1.25rem;
      margin: .85rem 0;
    }

    .quiz-q p {
      font-size: .9rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: .8rem;
    }

    .quiz-options {
      display: flex;
      flex-direction: column;
      gap: .45rem;
    }

    .quiz-opt {
      display: flex;
      align-items: center;
      gap: .6rem;
      padding: .55rem .85rem;
      border: 1.5px solid var(--border);
      border-radius: 7px;
      cursor: pointer;
      font-size: .85rem;
      color: var(--text);
      transition: all .15s;
      background: var(--surface);
      user-select: none;
    }

    .quiz-opt:hover {
      border-color: var(--border2);
      background: var(--pale);
    }

    .quiz-opt.selected {
      border-color: var(--dark);
      background: var(--pale);
      font-weight: 600;
    }

    .quiz-opt.correct {
      border-color: var(--dark);
      background: #e8e8e8;
    }

    .quiz-opt.wrong {
      border-color: #999;
      background: #f5f5f5;
      opacity: .6;
    }

    .quiz-opt code {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: .8rem;
      background: #e8e4f0;
      color: #5b21b6;
      padding: 1px 5px;
      border-radius: 4px;
    }

    .quiz-opt .opt-letter {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 1.5px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .7rem;
      font-weight: 700;
      flex-shrink: 0;
      transition: all .15s;
    }

    .quiz-opt.selected .opt-letter {
      background: var(--dark);
      color: #fff;
      border-color: var(--dark);
    }

    .quiz-opt.correct .opt-letter {
      background: var(--dark);
      color: #fff;
      border-color: var(--dark);
    }

    .quiz-feedback code {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: .78rem;
      background: rgba(0,0,0,.08);
      padding: 1px 5px;
      border-radius: 4px;
    }

    .quiz-feedback {
      margin-top: .7rem;
      padding: .65rem .9rem;
      border-radius: 7px;
      font-size: .82rem;
      font-weight: 600;
      display: none;
    }

    .quiz-feedback.show {
      display: block;
    }

    .quiz-feedback.ok {
      background: #e8e8e8;
      color: var(--dark);
      border: 1px solid var(--border2);
    }

    .quiz-feedback.err {
      background: #f5f5f5;
      color: #555;
      border: 1px solid var(--border);
    }

    .quiz-submit {
      margin-top: 1rem;
      background: var(--dark);
      color: #fff;
      border: none;
      border-radius: 999px;
      padding: .6rem 1.8rem;
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s;
    }

    .quiz-submit:hover {
      opacity: .85;
    }

    .quiz-submit:disabled {
      background: var(--border);
      color: var(--muted);
      cursor: default;
    }

    .quiz-score {
      margin-top: 1rem;
      padding: .8rem 1rem;
      border-radius: 9px;
      text-align: center;
      background: var(--pale);
      border: 1px solid var(--border2);
      display: none;
    }

    .quiz-score.show {
      display: block;
    }

    .quiz-score .score-num {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--dark);
    }

    .quiz-score .score-label {
      font-size: .75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .07em;
    }

    /* ══ COMPLETE ════════════════════════════════════════════════════════════ */
    .complete-slide {
      max-width: 640px;
      margin: 1.5rem auto;
      text-align: center;
    }

    .complete-emoji {
      font-size: 3.5rem;
      margin-bottom: .9rem;
    }

    .complete-slide h1 {
      font-size: 2rem;
      font-weight: 800;
      color: var(--dark);
      margin-bottom: .7rem;
    }

    .complete-slide>p {
      color: var(--muted);
      font-size: .95rem;
      margin-bottom: 1.5rem;
    }

    .stats-row {
      display: flex;
      justify-content: center;
      gap: 1.25rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .stat-box {
      background: var(--pale);
      border: 1px solid var(--border2);
      border-radius: 10px;
      padding: .85rem 1.35rem;
      min-width: 90px;
    }

    .stat-num {
      font-size: 1.7rem;
      font-weight: 800;
      color: var(--dark);
    }

    .stat-label {
      font-size: .68rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .07em;
      margin-top: 2px;
    }

    /* ══ NAV BAR ══════════════════════════════════════════════════════════════ */
    .nav-bar {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: .65rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      box-shadow: 0 -2px 10px rgba(0, 0, 0, .04);
    }

    .nav-btn {
      background: var(--dark);
      color: #fff;
      border: none;
      border-radius: 999px;
      padding: .5rem 1.5rem;
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s, transform .15s;
    }

    .nav-btn:hover:not(:disabled) {
      opacity: .85;
      transform: translateY(-1px);
    }

    .nav-btn:disabled {
      background: var(--border);
      color: var(--muted);
      cursor: default;
    }

    .nav-btn.sec {
      background: var(--pale);
      color: var(--dark);
      border: 1px solid var(--border2);
    }

    .nav-btn.sec:hover:not(:disabled) {
      background: var(--border);
    }

    .nav-hint {
      font-size: .72rem;
      color: var(--muted);
    }

    /* ══ TOAST ════════════════════════════════════════════════════════════════ */
    .toast {
      position: fixed;
      bottom: 5rem;
      left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: var(--dark);
      color: #fff;
      padding: .55rem 1.3rem;
      border-radius: 999px;
      font-size: .8rem;
      font-weight: 600;
      opacity: 0;
      pointer-events: none;
      transition: all .22s ease;
      z-index: 9999;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>

<body>

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <span class="header-emoji">🍽️</span>
      <div>
        <div class="header-title">Forge Elaborate</div>
        <div class="header-sub">Lunch &amp; Learn · /forge:elaborate Walkthrough</div>
      </div>
    </div>
    <div class="header-right">
      <div class="h-pill">Step <span id="cur-slide">1</span> / <span id="tot-slides">—</span></div>
      <div class="h-pill progress-pill">Progress: <span id="progress-pct">0%</span></div>
      <div class="h-pill reset-btn" onclick="resetProgress()">↺ Reset</div>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>

  <!-- Layout -->
  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-resizer" id="sidebar-resizer"></div>
      <div class="sidebar-head">
        <h3>Steps</h3>
        <button class="collapse-btn" onclick="toggleSidebar()">◀</button>
      </div>
      <div class="sidebar-list" id="sidebar-list"></div>
    </aside>
    <button class="expand-btn" id="expand-btn" onclick="toggleSidebar()">▶</button>
    <div class="slide-area" id="slide-area"></div>
  </div>


  <!-- Footer -->
  <div id="site-footer"
    style="text-align:center;padding:.55rem;font-size:.72rem;color:#aaa;flex-shrink:0;background:var(--bg);">
    🌿 Platform Engineering Trainings 🌿 &nbsp;·&nbsp; © Rakuten Rewards
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    // ═══════════════════════════════════════════════════════════════
    // SLIDE DATA
    // ═══════════════════════════════════════════════════════════════
    // Section definitions — maps slide index ranges to section labels
    // Built after slides array is defined (see buildSections())
    const SECTIONS = [
      { label: 'Section 1: Getting Started', slideIds: ['step-1'] },
      { label: 'Section 2: Select the Effort', slideIds: ['step-2'] },
      { label: 'Section 3: Elaborate Requirements', slideIds: ['step-3'] },
    ];

    const SUBSTEPS = {};

    const slides = [

      // ── WELCOME ──────────────────────────────────────────────────
      { type: 'welcome', title: 'Welcome' },

      // ── STEP 1 ───────────────────────────────────────────────────
      {
        type: 'step', num: '1', id: 'step-1',
        title: 'Clone the Repo', desc: 'Get the codebase onto your machine',
        content: `
        <p style="font-size:.95rem;color:var(--muted);margin-bottom:.75rem;">Clone the lunch &amp; learn repo and switch into it.</p>
        <div class="cmd-block">
          <pre><span class="t-cmd">git</span> clone https://github.com/rewards-devops/dishly-platform <span class="t-flag">&amp;&amp;</span> <span class="t-cmd">cd</span> dishly-platform</pre>
          <button class="copy-btn" onclick="copyText(this,'git clone https://github.com/rewards-devops/dishly-platform && cd dishly-platform')">Copy</button>
        </div>
        <div style="margin-top:1.1rem;padding:14px 18px;background:rgba(124,58,237,0.07);border:1px solid rgba(124,58,237,0.25);border-radius:10px;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;">
          <div>
            <p style="font-size:.85rem;font-weight:600;color:var(--dark);margin-bottom:3px;">No git access?</p>
            <p style="font-size:.8rem;color:var(--muted);">Download the zip, unzip it, then <code>cd dishly-platform</code> in your terminal.</p>
          </div>
          <a href="dishly-platform-main.zip" download="dishly-platform-main.zip"
             style="display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:999px;background:linear-gradient(135deg,#5b21b6,#7c3aed);color:#fff;font-size:.82rem;font-weight:600;text-decoration:none;white-space:nowrap;flex-shrink:0;">
            &#8659; Download ZIP
          </a>
        </div>
      `
      },

      // ── STEP 1.1 ─────────────────────────────────────────────────
      {
        type: 'substep', num: '1.1', parentId: 'step-1', nextLabel: 'Next Lesson → Step 2',
        title: 'Requirements Reference', desc: 'Business requirements & PRD for this effort',
        content: `
        <p style="font-size:.95rem;color:var(--muted);margin-bottom:.9rem;">Before running <code>forge:elaborate</code>, familiarise yourself with the existing requirements artifacts for this effort. The repo already contains both the business requirements and a linked PRD.</p>
        <div class="substep-title">Business Requirements &amp; PRD</div>
        <div class="info-box">
          The requirements folder contains two key files:
          <ul style="padding-left:1.2rem;margin-top:.5rem;line-height:1.9;">
            <li>
              <a href="https://github.com/rewards-devops/dishly-platform/tree/main/.forge/efforts/dining-concierge-reservations/requirements/business.md" target="_blank" style="font-weight:700;color:var(--dark);">business.md</a>
              — stakeholder goals, user stories, and acceptance criteria
              <span style="margin-left:.5rem;font-size:.72rem;">
                <a href="https://rr-productivity-portal-prod.shared.rr-it.com/api/forge-docs/rewards-devops/dishly-platform/file/.forge/site/viewer.html?file=.forge%2Fefforts%2Factive%2Fdining-concierge-reservations%2Frequirements%2Fbusiness.md" target="_blank" style="color:var(--muted);text-decoration:none;border:1px solid var(--border2);border-radius:4px;padding:1px 7px;font-weight:600;white-space:nowrap;">forge:docs ↗</a>
              </span>
            </li>
            <li>
              <a href="https://github.com/rewards-devops/dishly-platform/tree/main/.forge/efforts/dining-concierge-reservations/requirements/prd.md" target="_blank" style="font-weight:700;color:var(--dark);">prd.md</a>
              — product vision, goals, features, and success metrics
              <span style="margin-left:.5rem;font-size:.72rem;">
                <a href="https://rr-productivity-portal-prod.shared.rr-it.com/api/forge-docs/rewards-devops/dishly-platform/file/.forge/site/viewer.html?file=.forge%2Fefforts%2Factive%2Fdining-concierge-reservations%2Frequirements%2Fprd.md" target="_blank" style="color:var(--muted);text-decoration:none;border:1px solid var(--border2);border-radius:4px;padding:1px 7px;font-weight:600;white-space:nowrap;">forge:docs ↗</a>
              </span>
            </li>
          </ul>
        </div>
      `
      },

      // ── STEP 2: Select the Effort ────────────────────────────────
      {
        type: 'step', num: '2', id: 'step-2', nextLabel: 'Next Lesson → Step 3',
        title: 'Select the Effort', desc: 'Set the session-local active effort — /forge:effort --select',
        content: `
        <p style="font-size:.93rem;color:var(--muted);line-height:1.7;margin-bottom:1rem;"><code>forge:effort --select &lt;ID&gt;</code> sets the session-local active effort so that all subsequent Forge skills (<code>forge:elaborate</code>, <code>forge:plan</code>, <code>forge:status</code>, etc.) know which effort to operate on.</p>

        <div class="substep-title">Run this in Claude Code</div>
        <div class="cmd-block" style="margin-bottom:1.1rem;">
          <pre><span class="t-str typing-text" data-type-text="forge:effort --select dining_concierge_reservations"></span></pre>
          <button class="copy-btn" onclick="copyText(this,'forge:effort --select dining_concierge_reservations')">Copy</button>
        </div>

        <div class="substep-title">What it does</div>
        <div class="result-grid" style="margin-bottom:1.1rem;">
          <div class="result-row"><span class="result-file" style="min-width:28px;font-family:inherit;font-size:.82rem;font-weight:700;">1</span><span class="result-desc"><strong>Resolves the ID</strong> — if you pass a number it resolves to the Nth effort from the last list shown; otherwise treats it as a literal effort ID</span></div>
          <div class="result-row"><span class="result-file" style="min-width:28px;font-family:inherit;font-size:.82rem;font-weight:700;">2</span><span class="result-desc"><strong>Verifies</strong> <code>.forge/efforts/active/&lt;id&gt;/</code> exists — stops with a helpful error if not found</span></div>
          <div class="result-row"><span class="result-file" style="min-width:28px;font-family:inherit;font-size:.82rem;font-weight:700;">3</span><span class="result-desc"><strong>Writes the ID</strong> to <code>.forge/EFFORT</code> — a gitignored file that acts as the session pointer</span></div>
          <div class="result-row"><span class="result-file" style="min-width:28px;font-family:inherit;font-size:.82rem;font-weight:700;">4</span><span class="result-desc"><strong>Prints</strong> <code>Active effort set to: dining_concierge_reservations</code></span></div>
          <div class="result-row"><span class="result-file" style="min-width:28px;font-family:inherit;font-size:.82rem;font-weight:700;">5</span><span class="result-desc"><strong>Runs <code>forge:status</code></strong> — shows full effort context: phase, artifact inventory, task completion, open decisions, and suggested next action</span></div>
        </div>

        <div class="info-box" style="margin-bottom:1rem;">
          <strong>When to use it:</strong>
          <ul style="padding-left:1.15rem;margin-top:.4rem;line-height:1.9;">
            <li>Switching between efforts mid-session</li>
            <li>Starting a fresh session where <code>.forge/EFFORT</code> is absent or stale</li>
            <li>After browsing the effort list — pick the one you want by number</li>
          </ul>
        </div>

        <div class="success-box">
          <strong>Note:</strong> This does <em>not</em> create, modify, or promote any effort — it is purely a pointer update. All scaffolding (directory, <code>.state.json</code>, branch, Jira link) was done when the effort was originally created with <code>forge:effort</code>.
        </div>
      `
      },

      // ── STEP 3: Elaborate Requirements ───────────────────────────
      {
        type: 'step', num: '3', id: 'step-3', markComplete: true,
        title: 'Elaborate Requirements', desc: 'Conversational discovery interview — /forge:elaborate',
        content: `
        <p style="font-size:.93rem;color:var(--muted);line-height:1.7;margin-bottom:1rem;"><code>forge:elaborate</code> is a conversational discovery interview that builds shared understanding of what needs to be built. It reads all existing effort artifacts, then interviews you with dependency-ordered questions until the problem is fully understood. Every agreed answer is written immediately to the correct artifact — not batched at the end.</p>

        <div class="cmd-block" style="margin-bottom:1.1rem;">
          <pre><span class="t-str typing-text" data-type-text="/forge:elaborate"></span></pre>
          <button class="copy-btn" onclick="copyText(this,'/forge:elaborate')">Copy</button>
        </div>

        <div class="substep-title">What it produces</div>
        <div class="result-grid" style="margin-bottom:1.1rem;">
          <div class="result-row"><span class="result-file">requirements/functional.md</span><span class="result-desc">system behaviors, each tracing to a BR</span></div>
          <div class="result-row"><span class="result-file">requirements/technical.md</span><span class="result-desc">measurable constraints — latency, availability, mandates</span></div>
          <div class="result-row"><span class="result-file">requirements/user-stories.md</span><span class="result-desc">Connexna-format stories for user-facing FRs</span></div>
          <div class="result-row"><span class="result-file">ADRs via forge:adr</span><span class="result-desc">design decisions made during the interview</span></div>
          <div class="result-row"><span class="result-file">requirements/open-questions.md</span><span class="result-desc">anything explicitly deferred</span></div>
        </div>

        <div class="substep-title">Key behaviours</div>
        <div class="info-box" style="margin-bottom:1rem;">
          <ul style="padding-left:1.15rem;line-height:2;">
            <li><strong>Recommendation-first</strong> — every question includes a suggested answer and rationale; you react rather than generate from scratch</li>
            <li><strong>Write-as-you-go</strong> — each agreed answer is written before the next question, so partial sessions leave coherent artifacts</li>
            <li><strong>Spec delegation</strong> — when a layer needs deeper design (UX, data model, API), it invokes the relevant spec skill and resumes after</li>
            <li><strong>Brownfield-aware</strong> — maps each BR to <code>COVERED / PARTIAL / GAP</code> before the interview, so questions focus on gaps only</li>
            <li><strong>Re-invokable</strong> — safe to run again mid-effort; picks up from where elaboration left off</li>
          </ul>
        </div>

        <div class="success-box">
          <strong>After the interview:</strong> automatically runs <code>forge:classify</code> (risk classification) and <code>forge:spec-tests</code> (BDD scenario generation), then offers to commit or move to <code>forge:plan</code>.
        </div>

        <hr class="div">
        <p style="font-size:.82rem;color:var(--muted);"><strong style="color:var(--dark);">Mob mode</strong> <code style="font-size:.78rem;">--mob</code> — adds consensus gates after each question, requires <code>business.md</code> to exist (PM must run <code>forge:prd</code> first), and ends with a session summary for the group.</p>
      `
      },


    ];

    // ═══════════════════════════════════════════════════════════════
    // STATE
    // ═══════════════════════════════════════════════════════════════
    let current = 0;
    let doneSet = new Set(JSON.parse(localStorage.getItem('lnl_done') || '[]'));
    let quizAnswers = JSON.parse(localStorage.getItem('lnl_quiz') || '{}');
    let maxReached = 9999;

    function saveDone() { localStorage.setItem('lnl_done', JSON.stringify([...doneSet])); }
    function saveQuiz() { localStorage.setItem('lnl_quiz', JSON.stringify(quizAnswers)); }
    function saveReached() { localStorage.setItem('lnl_reached', maxReached); }

    function resetProgress() {
      if (!confirm('Reset all progress? This cannot be undone.')) return;
      localStorage.removeItem('lnl_done');
      localStorage.removeItem('lnl_quiz');
      localStorage.removeItem('lnl_reached');
      doneSet = new Set();
      quizAnswers = {};
      maxReached = 0;
      slides.forEach((_, i) => {
        document.getElementById('sb-' + i)?.classList.remove('done');
      });
      updateSidebarLocks();
      goTo(0);
    }

    // ═══════════════════════════════════════════════════════════════
    // BUILD
    // ═══════════════════════════════════════════════════════════════
    function build() {
      const area = document.getElementById('slide-area');
      const list = document.getElementById('sidebar-list');
      document.getElementById('tot-slides').textContent = slides.length;

      // Track which section we last emitted to avoid duplicate headers
      const sectionBySlideId = {};
      SECTIONS.forEach(sec => sec.slideIds.forEach(sid => sectionBySlideId[sid] = sec.label));
      const emittedSections = new Set();

      slides.forEach((s, i) => {
        // ── Slide element ──
        const el = document.createElement('div');
        el.className = 'slide' + (i === 0 ? ' active' + (s.type === 'welcome' ? ' welcome-active' : '') : '');
        el.id = 'slide-' + i;
        el.innerHTML = renderSlide(s, i);
        area.appendChild(el);

        // ── Sidebar: inject section header if needed ──
        if (s.id && sectionBySlideId[s.id] && !emittedSections.has(sectionBySlideId[s.id])) {
          const secEl = document.createElement('div');
          secEl.className = 'sb-section';
          secEl.textContent = sectionBySlideId[s.id];
          list.appendChild(secEl);
          emittedSections.add(sectionBySlideId[s.id]);
        }

        // ── Sidebar: main item ──
        const li = document.createElement('div');
        li.className = 'sb-item' + (i === 0 ? ' active' : '') + (doneSet.has(i) ? ' done' : '');
        li.id = 'sb-' + i;
        li.onclick = () => goTo(i);

        const hasChildren = s.type === 'step' && s.id && slides.some(x => x.type === 'substep' && x.parentId === s.id);
        let dotContent, labelText, subText, isSubstep = false;
        if (s.type === 'welcome') { dotContent = '★'; labelText = 'Welcome'; subText = 'Start here'; }
        else if (s.type === 'complete') { dotContent = '✦'; labelText = 'All Done'; subText = 'Finish'; }
        else if (s.type === 'quiz') { dotContent = '?'; labelText = 'Checkpoint'; subText = s.title; }
        else if (s.type === 'knowledge') { dotContent = '💡'; labelText = s.title; subText = s.desc || ''; }
        else if (s.type === 'substep') { dotContent = s.num; labelText = s.num + ' — ' + s.title; subText = s.desc || ''; isSubstep = true; }
        else { dotContent = s.num; labelText = 'Step ' + s.num + (s.optional ? ' <span style="font-size:.6rem;opacity:.55;font-weight:400;letter-spacing:.04em;">[optional]</span>' : ''); subText = s.title; }

        if (isSubstep) li.classList.add('substep');
        if (s.type === 'knowledge') li.classList.add('knowledge');

        li.innerHTML = `
        <div class="sb-dot"><span class="sb-num">${dotContent}</span></div>
        <div style="flex:1;min-width:0;">
          <div class="sb-label">${labelText}</div>
          ${subText ? `<div class="sb-sublabel">${subText}</div>` : ''}
        </div>
        ${hasChildren ? '<span class="sb-chevron">›</span>' : ''}`;
        list.appendChild(li);

        // ── Sidebar: decorative sub-step items for steps WITHOUT real substep slides ──
        if (s.id && SUBSTEPS[s.id] && !slides.some(x => x.type === 'substep' && x.parentId === s.id)) {
          SUBSTEPS[s.id].forEach(sub => {
            const subLi = document.createElement('div');
            subLi.className = 'sb-item substep';
            subLi.innerHTML = `
            <div class="sb-dot"><span class="sb-num">·</span></div>
            <div>
              <div class="sb-label">${sub.label}</div>
            </div>`;
            list.appendChild(subLi);
          });
        }
      });

      updateNav();
      updateProgress();
      updateSidebarLocks();
    }

    // ═══════════════════════════════════════════════════════════════
    // RENDER
    // ═══════════════════════════════════════════════════════════════
    function renderSlide(s, idx) {
      if (s.type === 'welcome') {
        // Build outline rows from slides (steps + quizzes + cert)
        const stepSlides = slides.filter(x => x.type === 'step');
        const quizSlides = slides.filter(x => x.type === 'quiz');
        const totalMins = 60;

        const groups = [
          { num: 1, title: 'Getting Started', mins: 5, quiz: false },
          { num: 2, title: 'Select the Effort', mins: 5, quiz: false },
          { num: 3, title: 'Elaborate Requirements', mins: 10, quiz: false },
        ];

        const outlineRows = groups.map((g, i) => `
        <div class="outline-item" onclick="goToSection(${i})" style="cursor:pointer;">
          <div class="oi-num">${g.num}</div>
          <div class="oi-body">
            <div class="oi-title">${g.title}</div>
            <div class="oi-meta">${g.mins} min${g.quiz ? ' &bull; Includes quiz' : ''}</div>
          </div>
          <span class="oi-arrow">›</span>
        </div>`).join('');

        return `<div class="welcome-slide">
        <div class="wl-left">
          <div class="wl-eyebrow">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
            LUNCH &amp; LEARN
          </div>
          <h1>Forge Elaborate<br>Lunch &amp; Learn</h1>
          <p>A step-by-step guide to elaborating requirements for the Concierge experience using the Forge framework inside Claude Code.</p>
          <div class="wl-meta">
            <div class="wl-meta-item">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
              ${totalMins} minutes
            </div>
          </div>
          <button class="btn-begin" onclick="nextSlide()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            Begin Tutorial
          </button>
          <div class="wl-autosave">Your progress is saved automatically</div>
        </div>
        <div class="wl-right">
          <div class="wl-outline-label">COURSE OUTLINE</div>
          <div class="outline-list">
            ${outlineRows}
          </div>
        </div>
      </div>`;
      }

      if (s.type === 'complete') {
        const total = slides.filter(x => x.type === 'step').length;
        return `<div class="complete-slide">
        <div class="complete-emoji">🎉</div>
        <h1>All Done!</h1>
        <p>You've walked through the Forge elaborate workflow — requirements are ready for the Concierge feature.</p>
        <div class="stats-row">
          <div class="stat-box"><div class="stat-num">${total}</div><div class="stat-label">Steps</div></div>
        </div>
        <button class="btn-primary" onclick="goTo(0)" style="margin-top:.5rem;background:var(--pale);color:var(--dark);border:1px solid var(--border2);box-shadow:none;">↩ Start Over</button>
      </div>`;
      }

      if (s.type === 'quiz') {
        return renderQuiz(s, idx);
      }

      if (s.type === 'knowledge') {
        return `<div class="step-slide">
        <div class="step-header">
          <div class="step-badge kb-badge">💡</div>
          <div class="step-title">
            <h2>${s.title}</h2>
            <p>${s.desc || ''}</p>
          </div>
        </div>
        ${s.content}
        <div style="margin-top:1.5rem;text-align:right;">
          <button class="btn-primary" onclick="nextSlide()">Continue →</button>
        </div>
      </div>`;
      }

      if (s.type === 'substep') {
        const isLast = s.markComplete === true;
        const btnLabel = s.nextLabel || 'Next Lesson →';
        const btnHTML = isLast
          ? `<button class="btn-primary" onclick="markDone(${idx})" id="done-btn-${idx}">
            ${doneSet.has(idx) ? '<span style="color:#16a34a;font-size:1rem;">✓</span> Marked Complete' : 'Mark as Complete'}
           </button>`
          : `<button class="btn-primary" onclick="nextSlide()">${btnLabel}</button>`;
        return `<div class="step-slide">
        <div class="step-header">
          <div class="step-badge" style="font-size:.75rem;width:36px;height:36px;">${s.num}</div>
          <div class="step-title">
            <h2>${s.title}</h2>
            <p>${s.desc || ''}</p>
          </div>
        </div>
        ${s.content}
        <div style="margin-top:1.5rem;text-align:right;">${btnHTML}</div>
      </div>`;
      }

      // For step slides that have substeps or a nextLabel, show Next Lesson instead of Mark Complete
      const hasSubsteps = s.id && slides.some(x => x.type === 'substep' && x.parentId === s.id);
      const stepNextLabel = s.nextLabel || 'Next Lesson →';
      const skipBtn = s.optional
        ? `<button class="btn-skip" onclick="skipStep(${idx})" title="Mark as complete and skip ahead">Skip →</button>`
        : '';
      const stepBtnHTML = (hasSubsteps || s.nextLabel)
        ? `<div style="display:flex;align-items:center;gap:.75rem;justify-content:flex-end;">${skipBtn}<button class="btn-primary" onclick="nextSlide()">${stepNextLabel}</button></div>`
        : `<div style="display:flex;align-items:center;gap:.75rem;justify-content:flex-end;">${skipBtn}<button class="btn-primary" onclick="markDone(${idx})" id="done-btn-${idx}">
          ${doneSet.has(idx) ? '<span style="color:#16a34a;font-size:1rem;">✓</span> Marked Complete' : 'Mark Step Complete'}
        </button></div>`;

      return `<div class="step-slide">
      <div class="step-header">
        <div class="step-badge">${s.num}</div>
        <div class="step-title">
          <h2>${s.title}</h2>
          <p>${s.desc}</p>
        </div>
      </div>
      ${s.content}
      <div style="margin-top:1.5rem;">${stepBtnHTML}</div>
    </div>`;
    }

    function renderQuiz(s, idx) {
      const saved = quizAnswers[s.id] || {};
      const submitted = saved.submitted;
      let score = 0;

      const qHTML = s.questions.map((q, qi) => {
        const chosen = saved[qi];
        const isSubmitted = submitted;

        const optsHTML = q.opts.map((opt, oi) => {
          let cls = 'quiz-opt';
          if (isSubmitted) {
            if (oi === q.answer) cls += ' correct';
            else if (oi === chosen && oi !== q.answer) cls += ' wrong';
            else if (oi === chosen) cls += ' selected';
          } else {
            if (oi === chosen) cls += ' selected';
          }
          const letter = String.fromCharCode(65 + oi);
          return `<div class="${cls}" onclick="${isSubmitted ? '' : `pickOpt('${s.id}',${qi},${oi},${idx})`}">
          <div class="opt-letter">${letter}</div>
          <span>${opt}</span>
        </div>`;
        }).join('');

        if (isSubmitted && chosen === q.answer) score++;
        const fb = isSubmitted
          ? `<div class="quiz-feedback ${chosen === q.answer ? 'ok' : 'err'} show">
            ${chosen === q.answer ? '✓ Correct — ' : '✗ Incorrect — '}${q.explain}
           </div>` : '';

        return `<div class="quiz-q" id="${s.id}-q${qi}">
        <p>${qi + 1}. ${q.q}</p>
        <div class="quiz-options">${optsHTML}</div>
        ${fb}
      </div>`;
      }).join('');

      const scoreHTML = submitted
        ? `<div class="quiz-score show"><div class="score-num">${score}/${s.questions.length}</div><div class="score-label">Score</div></div>` : '';

      const btnHTML = submitted
        ? `<div style="display:flex;flex-direction:column;align-items:center;gap:1rem;margin-top:1.5rem;">
            ${scoreHTML}
            <button class="btn-primary" onclick="nextSlide()">Next Lesson →</button>
           </div>`
        : `<button class="quiz-submit" id="${s.id}-submit" onclick="submitQuiz('${s.id}',${idx})" ${Object.keys(saved).length < s.questions.length ? 'disabled' : ''}>Submit Answers</button>`;

      return `<div class="quiz-slide">
      <div class="quiz-header">
        <div class="quiz-badge">❓</div>
        <div>
          <h2>${s.title}</h2>
          <p>${s.desc}</p>
        </div>
      </div>
      ${qHTML}
      ${btnHTML}
    </div>`;
    }

    // ═══════════════════════════════════════════════════════════════
    // QUIZ LOGIC
    // ═══════════════════════════════════════════════════════════════
    function pickOpt(qid, qi, oi, slideIdx) {
      if (!quizAnswers[qid]) quizAnswers[qid] = {};
      quizAnswers[qid][qi] = oi;
      saveQuiz();

      // Update option visuals
      const slide = slides[slideIdx];
      const opts = document.querySelectorAll(`#${qid}-q${qi} .quiz-opt`);
      opts.forEach((el, i) => {
        el.classList.toggle('selected', i === oi);
      });

      // Enable submit if all answered
      const allAnswered = slide.questions.every((_, i) => quizAnswers[qid][i] !== undefined);
      const btn = document.getElementById(`${qid}-submit`);
      if (btn) btn.disabled = !allAnswered;
    }

    function submitQuiz(qid, slideIdx) {
      if (!quizAnswers[qid]) return;
      quizAnswers[qid].submitted = true;
      saveQuiz();

      // Re-render quiz slide
      const slide = slides[slideIdx];
      const el = document.getElementById('slide-' + slideIdx);
      el.innerHTML = renderQuiz(slide, slideIdx);

      markDone(slideIdx);
    }

    // ═══════════════════════════════════════════════════════════════
    // PROGRESS
    // ═══════════════════════════════════════════════════════════════
    function skipStep(idx) {
      const s = slides[idx];
      // Mark the step itself done
      doneSet.add(idx);
      // Mark all its substeps done too
      if (s.id) {
        slides.forEach((sub, i) => {
          if (sub.type === 'substep' && sub.parentId === s.id) doneSet.add(i);
        });
      }
      saveDone();
      updateProgress();
      // Jump past all substeps of this step to the next step/section
      let target = idx + 1;
      if (s.id) {
        for (let i = idx + 1; i < slides.length; i++) {
          if (slides[i].type === 'substep' && slides[i].parentId === s.id) target = i + 1;
          else break;
        }
      }
      if (target > maxReached) { maxReached = target; localStorage.setItem('lnl_reached', maxReached); }
      showToast('Step skipped & marked complete');
      goTo(Math.min(target, slides.length - 1));
    }

    function markDone(idx) {
      doneSet.add(idx);
      saveDone();

      // Update sidebar item
      const sb = document.getElementById('sb-' + idx);
      if (sb) sb.classList.add('done');

      // If this is a markComplete substep, also mark the parent step done in sidebar
      const s = slides[idx];
      if (s.type === 'substep' && s.markComplete && s.parentId) {
        const parentIdx = slides.findIndex(x => x.id === s.parentId);
        if (parentIdx !== -1) {
          doneSet.add(parentIdx);
          saveDone();
          const parentSb = document.getElementById('sb-' + parentIdx);
          if (parentSb) parentSb.classList.add('done');
        }
      }

      // Update button
      const btn = document.getElementById('done-btn-' + idx);
      if (btn) {
        btn.innerHTML = '<span style="color:#16a34a;font-size:1rem;">✓</span> Marked Complete';
        btn.style.cssText = '';
      }

      updateProgress();

      // If completing a substep section, collapse substeps then jump to next non-quiz slide
      if (s && s.type === 'substep' && s.markComplete) {
        showToast('Section complete!');
        setTimeout(() => {
          let next = idx + 1;
          while (next < slides.length && slides[next].type === 'quiz') next++;
          if (next > maxReached) { maxReached = next; saveReached(); updateSidebarLocks(); }
          if (next < slides.length) goTo(next); else nextSlide();
        }, 600);
      } else {
        showToast('Step marked complete!');
        setTimeout(() => nextSlide(), 600);
      }
    }

    function isOptionalSlide(s) {
      if (s.optional) return true;
      if (s.type === 'substep' && s.parentId) {
        const parent = slides.find(x => x.id === s.parentId);
        if (parent && parent.optional) return true;
      }
      return false;
    }

    function updateProgress() {
      let completable = 0, done = 0;
      slides.forEach((s, i) => {
        if (isOptionalSlide(s)) return;
        if (s.type === 'welcome' || s.type === 'complete') return;
        completable++;
        if (doneSet.has(i)) done++;
      });
      const pct = completable > 0 ? Math.round((done / completable) * 100) : 0;
      document.getElementById('progress-pct').textContent = pct + '%';
      document.getElementById('progress-fill').style.width = pct + '%';
    }

    // ═══════════════════════════════════════════════════════════════
    // NAVIGATION
    // ═══════════════════════════════════════════════════════════════
    function goTo(idx) {
      if (idx < 0 || idx >= slides.length) return;
      if (idx > maxReached) { showToast('Complete the current step first'); return; }
      const prevEl = document.getElementById('slide-' + current);
      prevEl.classList.remove('active', 'welcome-active');
      document.getElementById('sb-' + current)?.classList.remove('active');
      current = idx;
      const curEl = document.getElementById('slide-' + current);
      curEl.classList.add('active');
      if (slides[current].type === 'welcome') curEl.classList.add('welcome-active');
      const sb = document.getElementById('sb-' + current);
      sb?.classList.add('active');
      sb?.scrollIntoView({ block: 'nearest' });
      updateSubstepExpansion();
      updateNav();
      updateProgress();
      startTypingAnimations();
    }

    function updateSidebarLocks() {
      slides.forEach((s, i) => {
        const el = document.getElementById('sb-' + i);
        if (!el) return;
        if (i > maxReached) {
          el.classList.add('locked');
        } else {
          el.classList.remove('locked');
        }
      });
    }

    function updateSubstepExpansion() {
      const cur = slides[current];
      // Determine which parentId is currently "active"
      const activeParentId = cur.type === 'substep' ? cur.parentId
        : cur.type === 'step' && slides.some(x => x.type === 'substep' && x.parentId === cur.id) ? cur.id
          : null;

      slides.forEach((s, i) => {
        if (s.type !== 'substep') return;
        const sbEl = document.getElementById('sb-' + i);
        if (!sbEl) return;
        if (s.parentId === activeParentId) {
          sbEl.classList.add('expanded');
        } else {
          sbEl.classList.remove('expanded');
        }
      });

      // Update chevron on parent items
      slides.forEach((s, i) => {
        if (s.type !== 'step') return;
        const sbEl = document.getElementById('sb-' + i);
        if (!sbEl) return;
        if (s.id === activeParentId) {
          sbEl.classList.add('expanded-parent');
        } else {
          sbEl.classList.remove('expanded-parent');
        }
      });
    }

    function nextSlide() {
      // Mark current slide done so sidebar turns green
      if (!doneSet.has(current)) {
        doneSet.add(current);
        saveDone();
        const li = document.getElementById('sb-' + current);
        if (li) li.classList.add('done');
        updateProgress();
      }
      const next = current + 1;
      if (next > maxReached) { maxReached = next; saveReached(); updateSidebarLocks(); }
      goTo(next);
    }
    function prevSlide() { goTo(current - 1); }

    function goToSection(sectionIndex) {
      const sec = SECTIONS[sectionIndex];
      if (!sec) { nextSlide(); return; }
      // Find the first slide matching this section's first slideId
      const firstId = sec.slideIds[0];
      const idx = slides.findIndex(s => s.id === firstId);
      if (idx === -1) { nextSlide(); return; }
      if (idx > maxReached) {
        showToast('Complete earlier sections first');
        return;
      }
      goTo(idx);
    }

    function updateNav() {
      const isWelcome = slides[current].type === 'welcome';
      document.getElementById('cur-slide').textContent = current + 1;
      document.querySelector('.header').style.display = isWelcome ? 'none' : '';
      document.getElementById('sidebar').style.display = isWelcome ? 'none' : '';
      document.getElementById('expand-btn').style.display = isWelcome ? 'none' : '';
      document.getElementById('site-footer').style.display = isWelcome ? 'none' : '';
      document.getElementById('support-widget').style.display = isWelcome ? 'none' : '';
    }

    // ═══════════════════════════════════════════════════════════════
    // SIDEBAR
    // ═══════════════════════════════════════════════════════════════
    function toggleSidebar() {
      const sb = document.getElementById('sidebar');
      const eb = document.getElementById('expand-btn');
      const c = sb.classList.toggle('collapsed');
      eb.classList.toggle('visible', c);
    }

    // ═══════════════════════════════════════════════════════════════
    // COPY
    // ═══════════════════════════════════════════════════════════════
    function copyText(btn, text) {
      navigator.clipboard.writeText(text).then(() => {
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        showToast('Copied to clipboard!');
        setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
      });
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2200);
    }

    // ═══════════════════════════════════════════════════════════════
    // KEYBOARD
    // ═══════════════════════════════════════════════════════════════
    document.addEventListener('keydown', e => {
      if (e.target.tagName === 'INPUT') return;
      if (e.key === 'ArrowRight') nextSlide();
      if (e.key === 'ArrowLeft') prevSlide();
    });

    // ═══════════════════════════════════════════════════════════════
    // TYPING ANIMATION
    // ═══════════════════════════════════════════════════════════════
    function startTypingAnimations() {
      const slide = document.getElementById('slide-' + current);
      if (!slide) return;
      const els = [...slide.querySelectorAll('.typing-text[data-type-text]')].filter(el => !el.dataset.typed);
      let delay = 300;
      els.forEach(el => {
        el.dataset.typed = '1';
        const text = el.dataset.typeText;
        el.textContent = '';
        const startAt = delay;
        delay += text.length * 38 + 300;
        setTimeout(() => {
          let i = 0;
          function type() {
            if (i <= text.length) {
              el.textContent = text.slice(0, i++);
              setTimeout(type, 38);
            }
          }
          type();
        }, startAt);
      });
    }

    // ═══════════════════════════════════════════════════════════════
    // SIDEBAR RESIZE
    // ═══════════════════════════════════════════════════════════════
    (function () {
      const resizer = document.getElementById('sidebar-resizer');
      const sidebar = document.getElementById('sidebar');
      let startX, startW;

      resizer.addEventListener('mousedown', e => {
        startX = e.clientX;
        startW = sidebar.offsetWidth;
        resizer.classList.add('dragging');
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';

        function onMove(e) {
          const w = Math.min(520, Math.max(180, startW + (e.clientX - startX)));
          sidebar.style.width = w + 'px';
        }
        function onUp() {
          resizer.classList.remove('dragging');
          document.body.style.cursor = '';
          document.body.style.userSelect = '';
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
        }
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
      });
    })();

    build();
  </script>
